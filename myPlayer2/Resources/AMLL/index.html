                return Number.isFinite(n) ? Math.round(n * 1000) : null;
            }
            const parts = value.split(":");
            if (parts.length === 2 || parts.length === 3) {
                const nums = parts.map((part) => Number.parseFloat(part));
                if (nums.some((n) => !Number.isFinite(n))) return null;
                if (parts.length === 2) {
                    return Math.round((nums[0] * 60 + nums[1]) * 1000);
                }
                return Math.round((nums[0] * 3600 + nums[1] * 60 + nums[2]) * 1000);
            }
            const raw = Number.parseFloat(value);
            return Number.isFinite(raw) ? Math.round(raw * 1000) : null;
        };

	        // Simplified time management - let AMLL core handle parallel lyrics via hotLines/bufferedLines.
	        // Fullscreen should only preserve completed word highlight while a line still belongs to
	        // the same foreground group that window-mode calcLayout uses.
	        const DEBUG_PARALLEL_EMPHASIS_TRACE = true;
	        let parallelEmphasisDiagnosticsSourceLines = [];
	        let parallelEmphasisDiagnosticPairs = [];
	        const lastParallelEmphasisLineState = new Map();
	        const lastParallelEmphasisPairState = new Map();
	        const getLineTextForTrace = (line) => {
	            if (!line || !Array.isArray(line.words)) return "";
	            return line.words.map((word) => (typeof word?.word === "string" ? word.word : "")).join("")
	                .replace(/\s+/g, " ")
	                .trim()
	                .slice(0, 72);
	        };
	        const wordShouldEmphasizeForTrace = (word) => {
	            if (!word || typeof word.word !== "string") return false;
	            const duration = (Number.isFinite(word.endTime) ? word.endTime : 0)
	                - (Number.isFinite(word.startTime) ? word.startTime : 0);
	            if (duration < 1000) return false;
	            const trimmed = word.word.trim();
	            if (!trimmed) return false;
	            const isCJK = /^[\p{Unified_Ideograph}\u0800-\u9FFC]+$/u.test(trimmed);
	            if (isCJK) return true;
	            return trimmed.length <= 7 && trimmed.length > 1;
	        };
	        const lineShouldEmphasizeForTrace = (line) => {
	            if (!line || !Array.isArray(line.words)) return false;
	            return line.words.some(wordShouldEmphasizeForTrace);
	        };
	        const getLineEmphasisWindowForTrace = (line) => {
	            if (!line || !Array.isArray(line.words)) return null;
	            let start = Number.POSITIVE_INFINITY;
	            let end = Number.NEGATIVE_INFINITY;
	            for (const word of line.words) {
	                if (!wordShouldEmphasizeForTrace(word)) continue;
	                const wordStart = Number.isFinite(word.startTime) ? word.startTime : NaN;
	                const wordEnd = Number.isFinite(word.endTime) ? word.endTime : NaN;
	                if (!Number.isFinite(wordStart) || !Number.isFinite(wordEnd)) continue;
	                start = Math.min(start, wordStart);
	                end = Math.max(end, wordEnd);
	            }
	            if (!Number.isFinite(start) || !Number.isFinite(end)) return null;
	            return { start, end };
	        };
	        const buildParallelEmphasisDiagnosticPairs = (lines) => {
	            if (!Array.isArray(lines) || lines.length === 0) return [];
	            const mainIndexes = [];
	            for (let i = 0; i < lines.length; i++) {
	                if (lines[i] && !lines[i].isBG) {
	                    mainIndexes.push(i);
	                }
	            }
	            const pairs = [];
	            for (let i = 0; i < mainIndexes.length - 1; i++) {
	                const aIdx = mainIndexes[i];
	                const bIdx = mainIndexes[i + 1];
	                const a = lines[aIdx];
	                const b = lines[bIdx];
	                if (!a || !b) continue;
	                const rawOverlap = Math.min(a.endTime, b.endTime) - Math.max(a.startTime, b.startTime);
	                if (!Number.isFinite(rawOverlap) || rawOverlap <= 0) continue;
	                const aEmphasisWindow = getLineEmphasisWindowForTrace(a);
	                const bEmphasisWindow = getLineEmphasisWindowForTrace(b);
	                if (!aEmphasisWindow && !bEmphasisWindow) continue;
	                pairs.push({
	                    key: `${aIdx}:${bIdx}`,
	                    aIdx,
	                    bIdx,
	                    rawOverlap,
	                    aText: getLineTextForTrace(a),
	                    bText: getLineTextForTrace(b),
	                    aRawStart: Number.isFinite(a.startTime) ? a.startTime : 0,
	                    aRawEnd: Number.isFinite(a.endTime) ? a.endTime : 0,
	                    bRawStart: Number.isFinite(b.startTime) ? b.startTime : 0,
	                    bRawEnd: Number.isFinite(b.endTime) ? b.endTime : 0,
	                    windowStart: Math.max(
	                        0,
	                        Math.min(
	                            aEmphasisWindow?.start ?? a.startTime ?? 0,
	                            bEmphasisWindow?.start ?? b.startTime ?? 0,
	                            b.startTime ?? 0
	                        ) - 600
	                    ),
	                    windowEnd: Math.max(
	                        aEmphasisWindow?.end ?? a.endTime ?? 0,
	                        bEmphasisWindow?.end ?? b.endTime ?? 0,
	                        (b.startTime ?? 0) + 900
	                    ) + 600,
	                });
	            }
	            return pairs;
	        };
	        const collectEmphasisStateForTrace = (lineObj) => {
	            const splitWords = Array.isArray(lineObj?.splittedWords) ? lineObj.splittedWords : [];
	            let running = 0;
	            let finished = 0;
	            let total = 0;
	            for (const splitWord of splitWords) {
	                const animations = Array.isArray(splitWord?.elementAnimations)
	                    ? splitWord.elementAnimations
	                    : [];
	                for (const animation of animations) {
	                    const id = typeof animation?.id === "string" ? animation.id : "";
	                    if (!id.includes("emphasize-word-") || id.includes("float")) continue;
	                    total += 1;
	                    if (animation.playState === "running") {
	                        running += 1;
	                        continue;
	                    }
	                    const currentTime = Number.isFinite(animation.currentTime) ? animation.currentTime : 0;
	                    const effectTiming = animation.effect?.getTiming?.();
	                    const duration = Number.isFinite(effectTiming?.duration) ? effectTiming.duration : 0;
	                    if (duration > 0 && currentTime >= duration - 1) {
	                        finished += 1;
	                    }
	                }
	            }
	            return { total, running, finished };
	        };
	        const emitParallelEmphasisTrace = (tag, payload) => {
	            console.log(`[LyricsRenderer][ParallelEmphasisTrace][${tag}] ${JSON.stringify(payload)}`);
	        };
	        const getProcessedMainLineInfoForTrace = (lineIdx) => {
	            if (!Array.isArray(lyricPlayer.currentLyricLineObjects)) return null;
	            const lineObj = lyricPlayer.currentLyricLineObjects[lineIdx];
	            const processedLine = lineObj?.getLine?.() ?? lineObj?.lyricLine ?? null;
	            if (!processedLine) return null;
	            return {
	                idx: lineIdx,
	                line: processedLine,
	                text: getLineTextForTrace(
	                    parallelEmphasisDiagnosticsSourceLines[lineIdx] ?? processedLine
	                ),
	            };
	        };
	        const findPreviousProcessedMainLineForTrace = (lineIdx) => {
	            for (let i = lineIdx - 1; i >= 0; i--) {
	                const info = getProcessedMainLineInfoForTrace(i);
	                if (info && info.line?.isBG !== true) return info;
	            }
	            return null;
	        };
	        const emitParallelEmphasisNormalizationTrace = () => {
	            try {
	                if (!DEBUG_PARALLEL_EMPHASIS_TRACE) return;
	                if (!Array.isArray(parallelEmphasisDiagnosticPairs) || parallelEmphasisDiagnosticPairs.length === 0) return;
	                const trackedLineIndexes = new Set();
	                for (const pair of parallelEmphasisDiagnosticPairs) {
	                    trackedLineIndexes.add(pair.aIdx);
	                    trackedLineIndexes.add(pair.bIdx);
	                }
	                for (const lineIdx of Array.from(trackedLineIndexes).sort((a, b) => a - b)) {
	                    const sourceLine = parallelEmphasisDiagnosticsSourceLines[lineIdx] ?? null;
	                    const processedInfo = getProcessedMainLineInfoForTrace(lineIdx);
	                    const processedLine = processedInfo?.line ?? null;
	                    if (!sourceLine || !processedLine || sourceLine.isBG === true || processedLine.isBG === true) continue;
	                    const prevMainInfo = findPreviousProcessedMainLineForTrace(lineIdx);
	                    const rawStart = Number.isFinite(sourceLine.startTime) ? sourceLine.startTime : null;
	                    const processedStart = Number.isFinite(processedLine.startTime) ? processedLine.startTime : null;
	                    const startShiftMs = rawStart !== null && processedStart !== null
	                        ? processedStart - rawStart
	                        : null;
	                    const prevProcessedEnd = Number.isFinite(prevMainInfo?.line?.endTime)
	                        ? prevMainInfo.line.endTime
	                        : null;
	                    const startClampedByPrevEnd = rawStart !== null
	                        && processedStart !== null
	                        && prevProcessedEnd !== null
	                        && processedStart > rawStart
	                        && Math.abs(processedStart - prevProcessedEnd) <= 1;
	                    emitParallelEmphasisTrace("Normalize", {
	                        idx: lineIdx,
	                        text: getLineTextForTrace(sourceLine),
	                        isBG: sourceLine.isBG === true,
	                        isDuet: sourceLine.isDuet === true,
	                        rawStart,
	                        rawEnd: Number.isFinite(sourceLine.endTime) ? sourceLine.endTime : null,
	                        processedStart,
	                        processedEnd: Number.isFinite(processedLine.endTime) ? processedLine.endTime : null,
	                        startShiftMs,
	                        prevMainIdx: prevMainInfo?.idx ?? null,
	                        prevMainText: prevMainInfo?.text ?? "",
	                        prevMainProcessedEnd: prevProcessedEnd,
	                        startClampedByPrevEnd,
	                    });
	                }
	            } catch (error) {
	                console.warn("[LyricsRenderer][ParallelEmphasisTrace][InternalError]", error);
	            }
	        };
	        const buildLineTraceSnapshot = (lineIdx, hotLines, bufferedLines) => {
	            const lineObj = lyricPlayer.currentLyricLineObjects?.[lineIdx];
	            const processedLine = lineObj?.getLine?.() ?? lineObj?.lyricLine ?? null;
	            const sourceLine = parallelEmphasisDiagnosticsSourceLines[lineIdx] ?? processedLine;
	            if (!processedLine && !sourceLine) return null;
	            const element = typeof lineObj?.getElement === "function"
	                ? lineObj.getElement()
	                : lineObj?.element;
	            const emphasisState = collectEmphasisStateForTrace(lineObj);
	            return {
	                idx: lineIdx,
	                text: getLineTextForTrace(sourceLine ?? processedLine),
	                isBG: sourceLine?.isBG === true || processedLine?.isBG === true,
	                isDuet: sourceLine?.isDuet === true || processedLine?.isDuet === true,
	                rawStart: Number.isFinite(sourceLine?.startTime) ? sourceLine.startTime : null,
	                rawEnd: Number.isFinite(sourceLine?.endTime) ? sourceLine.endTime : null,
	                processedStart: Number.isFinite(processedLine?.startTime) ? processedLine.startTime : null,
	                processedEnd: Number.isFinite(processedLine?.endTime) ? processedLine.endTime : null,
	                hot: hotLines.has(lineIdx),
	                buffered: bufferedLines.has(lineIdx),
	                enabled: lineObj?.isEnabled === true,
	                activeClass: typeof element?.className === "string" && element.className.includes("active"),
	                emphasisRunning: emphasisState.running,
	                emphasisFinished: emphasisState.finished,
	                emphasisTotal: emphasisState.total,
	            };
	        };
	        const traceParallelEmphasisState = (timeMs) => {
	            if (!DEBUG_PARALLEL_EMPHASIS_TRACE) return;
	            if (!Array.isArray(parallelEmphasisDiagnosticPairs) || parallelEmphasisDiagnosticPairs.length === 0) return;
	            const hotLines = lyricPlayer.hotLines instanceof Set ? lyricPlayer.hotLines : new Set();
	            const bufferedLines = lyricPlayer.bufferedLines instanceof Set ? lyricPlayer.bufferedLines : new Set();
	            const activePairs = parallelEmphasisDiagnosticPairs.filter(
	                (pair) => timeMs >= pair.windowStart && timeMs <= pair.windowEnd
	            );
	            if (activePairs.length === 0) return;
	            const trackedLineIndexes = new Set();
	            for (const pair of activePairs) {
	                trackedLineIndexes.add(pair.aIdx);
	                trackedLineIndexes.add(pair.bIdx);
	            }
	            const snapshots = new Map();
	            for (const lineIdx of trackedLineIndexes) {
	                const snapshot = buildLineTraceSnapshot(lineIdx, hotLines, bufferedLines);
	                if (!snapshot || snapshot.isBG) continue;
	                snapshots.set(lineIdx, snapshot);
	                const nextSignature = JSON.stringify({
	                    hot: snapshot.hot,
	                    buffered: snapshot.buffered,
	                    enabled: snapshot.enabled,
	                    activeClass: snapshot.activeClass,
	                    emphasisRunning: snapshot.emphasisRunning,
	                });
	                const previous = lastParallelEmphasisLineState.get(lineIdx);
	                if (!previous || previous.signature !== nextSignature) {
	                    emitParallelEmphasisTrace("Line", {
		                        timeMs,
		                        scrollToIndex: Number.isFinite(lyricPlayer.scrollToIndex)
		                            ? lyricPlayer.scrollToIndex
		                            : null,
	                        ...snapshot,
	                    });
	                }
	                if ((!previous || previous.snapshot.emphasisRunning <= 0) && snapshot.emphasisRunning > 0) {
	                    emitParallelEmphasisTrace("Emphasis", {
	                        event: "start",
	                        timeMs,
	                        idx: snapshot.idx,
	                        text: snapshot.text,
	                        rawStart: snapshot.rawStart,
	                        rawEnd: snapshot.rawEnd,
	                        processedStart: snapshot.processedStart,
	                        processedEnd: snapshot.processedEnd,
	                        emphasisRunning: snapshot.emphasisRunning,
	                        emphasisTotal: snapshot.emphasisTotal,
	                    });
	                }
	                if (previous && previous.snapshot.emphasisRunning > 0 && snapshot.emphasisRunning <= 0) {
	                    emitParallelEmphasisTrace("Emphasis", {
	                        event: "stop",
	                        timeMs,
	                        idx: snapshot.idx,
	                        text: snapshot.text,
	                        emphasisRunning: snapshot.emphasisRunning,
	                        emphasisFinished: snapshot.emphasisFinished,
	                        emphasisTotal: snapshot.emphasisTotal,
	                        enabled: snapshot.enabled,
	                    });
	                }
	                if (previous && previous.snapshot.enabled === true && snapshot.enabled === false) {
	                    emitParallelEmphasisTrace("Emphasis", {
	                        event: "disable",
	                        timeMs,
	                        idx: snapshot.idx,
	                        text: snapshot.text,
	                        hot: snapshot.hot,
	                        buffered: snapshot.buffered,
	                        activeClass: snapshot.activeClass,
	                        emphasisStillRunningAfterDisable: snapshot.emphasisRunning > 0,
	                        emphasisRunning: snapshot.emphasisRunning,
	                        emphasisFinished: snapshot.emphasisFinished,
	                        emphasisTotal: snapshot.emphasisTotal,
	                    });
	                }
	                lastParallelEmphasisLineState.set(lineIdx, {
	                    signature: nextSignature,
	                    snapshot,
	                });
	            }
	            for (const pair of activePairs) {
	                const aState = snapshots.get(pair.aIdx) ?? buildLineTraceSnapshot(pair.aIdx, hotLines, bufferedLines);
	                const bState = snapshots.get(pair.bIdx) ?? buildLineTraceSnapshot(pair.bIdx, hotLines, bufferedLines);
	                if (!aState || !bState) continue;
	                const pairReason = !bState.hot
	                    ? (Number.isFinite(bState.processedStart) && bState.processedStart > timeMs
	                        ? "b_not_hot_processed_start_not_reached"
	                        : (!bState.enabled ? "b_not_hot_not_enabled" : "b_not_hot_unknown"))
	                    : (aState.emphasisRunning > 0 ? "b_hot_while_a_emphasis_running" : "b_hot");
	                const pairSignature = JSON.stringify({
	                    aHot: aState.hot,
	                    aBuffered: aState.buffered,
	                    aEnabled: aState.enabled,
	                    aEmphasisRunning: aState.emphasisRunning,
	                    bHot: bState.hot,
	                    bBuffered: bState.buffered,
	                    bEnabled: bState.enabled,
	                    reason: pairReason,
	                });
	                const nearConflictBoundary = timeMs >= pair.bRawStart - 150 && timeMs <= pair.bRawStart + 1200;
	                if (!nearConflictBoundary) continue;
	                if (lastParallelEmphasisPairState.get(pair.key) === pairSignature) continue;
	                lastParallelEmphasisPairState.set(pair.key, pairSignature);
	                emitParallelEmphasisTrace("Pair", {
	                    timeMs,
	                    rawOverlap: pair.rawOverlap,
		                    a: {
		                        idx: pair.aIdx,
		                        text: pair.aText,
		                        isDuet: aState.isDuet,
		                        rawStart: pair.aRawStart,
		                        rawEnd: pair.aRawEnd,
		                        processedStart: aState.processedStart,
	                        processedEnd: aState.processedEnd,
	                        hot: aState.hot,
	                        buffered: aState.buffered,
	                        enabled: aState.enabled,
	                        activeClass: aState.activeClass,
	                        emphasisRunning: aState.emphasisRunning,
	                    },
		                    b: {
		                        idx: pair.bIdx,
		                        text: pair.bText,
		                        isDuet: bState.isDuet,
		                        rawStart: pair.bRawStart,
		                        rawEnd: pair.bRawEnd,
		                        processedStart: bState.processedStart,
	                        processedEnd: bState.processedEnd,
	                        hot: bState.hot,
	                        buffered: bState.buffered,
	                        enabled: bState.enabled,
	                        activeClass: bState.activeClass,
	                        emphasisRunning: bState.emphasisRunning,
	                    },
	                    reason: pairReason,
	                });
	            }
	        };
	        const clearFullscreenCompletedHighlightState = () => {
	            if (!Array.isArray(lyricPlayer.currentLyricLineObjects)) return;
	            for (const lineObj of lyricPlayer.currentLyricLineObjects) {
	                const lineElement = lineObj?.element;
	                if (lineElement instanceof HTMLElement) {
	                    delete lineElement.dataset.fsCompletedHighlight;
	                }
	            }
	        };

        const clearParallelEmphasisDiagnostics = () => {
            parallelEmphasisDiagnosticsSourceLines = [];
            parallelEmphasisDiagnosticPairs = [];
            lastParallelEmphasisLineState.clear();
            lastParallelEmphasisPairState.clear();
        };

        const cancelAnimationList = (animations) => {
            if (!Array.isArray(animations)) return 0;
            let count = 0;
            for (const animation of animations) {
                if (!(animation instanceof Animation)) continue;
                count += 1;
                cancelAnimationSafely(animation);
            }
            return count;
        };

        const cancelSubtreeAnimations = (element) => {
            if (!(element instanceof Element) || typeof element.getAnimations !== "function") {
                return 0;
            }
            const animations = element.getAnimations({ subtree: true });
            return cancelAnimationList(animations);
        };

        const removeNodeSafely = (node) => {
            if (!(node instanceof Node)) return 0;
            if (node.parentNode) {
                node.parentNode.removeChild(node);
                return 1;
            }
            return 0;
        };

        const releaseSplitWordAuxiliaryState = (splitWord) => {
            if (!splitWord || typeof splitWord !== "object") {
                return {
                    cancelledAnimations: 0,
                    removedNodes: 0,
                    fsCharRecords: 0,
                    cbCharRecords: 0,
                };
            }

            let cancelledAnimations = 0;
            let removedNodes = 0;

            cancelledAnimations += cancelAnimationList(splitWord.elementAnimations);
            cancelledAnimations += cancelAnimationList(splitWord.maskAnimations);
            cancelledAnimations += cancelAnimationList(splitWord.__fsSourceElementAnimations);
            cancelledAnimations += cancelAnimationList(splitWord.__fsInstalledElementAnimations);
            cancelledAnimations += cancelAnimationList(splitWord.__fsInstalledMaskAnimations);
            cancelledAnimations += cancelAnimationList(splitWord.__fsGlowAnimations);
            cancelledAnimations += cancelAnimationList(splitWord.__cbInstalledElementAnimations);
            cancelledAnimations += cancelAnimationList(splitWord.__cbInstalledMaskAnimations);
            cancelledAnimations += cancelAnimationList(splitWord.__cbGlowAnimations);

            if (splitWord.__fsPackedAnimation instanceof Animation) {
                cancelledAnimations += 1;
                cancelAnimationSafely(splitWord.__fsPackedAnimation);
            }
            if (splitWord.__cbPackedAnimation instanceof Animation) {
                cancelledAnimations += 1;
                cancelAnimationSafely(splitWord.__cbPackedAnimation);
            }

            const fsCharRecords = Array.isArray(splitWord.__fsCharRecords)
                ? splitWord.__fsCharRecords.length
                : 0;
            const cbCharRecords = Array.isArray(splitWord.__cbCharRecords)
                ? splitWord.__cbCharRecords.length
                : 0;

            // Clear cover-blur emphasis body channel attr before detaching the stack;
            // safe no-op when the stack is already detached or never tagged.
            if (splitWord.__fsWordStackElement instanceof HTMLElement) {
                splitWord.__fsWordStackElement.removeAttribute("data-amll-fs-emphasis-body");
            }

            removedNodes += removeNodeSafely(splitWord.__fsGlowLayer);
            removedNodes += removeNodeSafely(splitWord.__cbGlowLayer);
            removedNodes += removeNodeSafely(splitWord.__fsWordStackElement);
            removedNodes += removeNodeSafely(splitWord.__cbWordStackElement);
            removedNodes += removeNodeSafely(splitWord.__fsBaseWordElement);
            removedNodes += removeNodeSafely(splitWord.__cbBaseWordElement);

            splitWord.__fsGlowLayer = null;
            splitWord.__cbGlowLayer = null;
            splitWord.__fsWordStackElement = null;
            splitWord.__cbWordStackElement = null;
            splitWord.__fsBaseWordElement = null;
            splitWord.__cbBaseWordElement = null;
            splitWord.__fsGlowAnimations = [];
            splitWord.__cbGlowAnimations = [];
            splitWord.__fsSourceElementAnimations = [];
            splitWord.__fsInstalledElementAnimations = [];
            splitWord.__cbInstalledElementAnimations = [];
            splitWord.__fsInstalledMaskAnimations = [];
            splitWord.__cbInstalledMaskAnimations = [];
            splitWord.__fsCharRecords = [];
            splitWord.__cbCharRecords = [];
            splitWord.__fsPackedAnimation = null;
            splitWord.__cbPackedAnimation = null;
            splitWord.__fsElementAnimationsInstalled = false;
            splitWord.__cbElementAnimationsInstalled = false;

            return {
                cancelledAnimations,
                removedNodes,
                fsCharRecords,
                cbCharRecords,
            };
        };

        const teardownCurrentLyricObjects = () => {
            const lineObjects = Array.isArray(lyricPlayer.currentLyricLineObjects)
                ? lyricPlayer.currentLyricLineObjects
                : [];
            let cancelledAnimations = 0;
            let removedNodes = 0;
            let wordObjects = 0;
            let fsCharRecords = 0;
            let cbCharRecords = 0;

            cancelledAnimations += cancelSubtreeAnimations(lyricPlayer.getElement());

            for (const lineObj of lineObjects) {
                if (typeof lineObj?.pause === "function") {
                    lineObj.pause();
                }
                if (typeof lineObj?.disable === "function") {
                    lineObj.disable();
                }

                const lineElement =
                    typeof lineObj?.getElement === "function" ? lineObj.getElement() : lineObj?.element;
                cancelledAnimations += cancelSubtreeAnimations(lineElement);

                const splitWords = Array.isArray(lineObj?.splittedWords) ? lineObj.splittedWords : [];
                wordObjects += splitWords.length;
                for (const splitWord of splitWords) {
                    const summary = releaseSplitWordAuxiliaryState(splitWord);
                    cancelledAnimations += summary.cancelledAnimations;
                    removedNodes += summary.removedNodes;
                    fsCharRecords += summary.fsCharRecords;
                    cbCharRecords += summary.cbCharRecords;
                }
            }

            return {
                lineObjects: lineObjects.length,
                wordObjects,
                cancelledAnimations,
                removedNodes,
                fsCharRecords,
                cbCharRecords,
            };
        };

        const summarizeAnimations = (animations) => {
            const summary = {
                total: 0,
                running: 0,
                paused: 0,
                finished: 0,
                idle: 0,
            };
            if (!Array.isArray(animations)) {
                return summary;
            }
            for (const animation of animations) {
                if (!(animation instanceof Animation)) continue;
                summary.total += 1;
                switch (animation.playState) {
                case "running":
                    summary.running += 1;
                    break;
                case "paused":
                    summary.paused += 1;
                    break;
                case "finished":
                    summary.finished += 1;
                    break;
                case "idle":
                    summary.idle += 1;
                    break;
                default:
                    break;
                }
            }
            return summary;
        };

        const collectRendererDiagnostics = (label = "") => {
            const playerElement = lyricPlayer.getElement();
            const lineObjects = Array.isArray(lyricPlayer.currentLyricLineObjects)
                ? lyricPlayer.currentLyricLineObjects
                : [];
            let splitWordCount = 0;
            let emphasizedWordCount = 0;
            let subElementCount = 0;
            let auxiliaryAnimationRefs = 0;
            let auxiliaryNodeRefs = 0;

            for (const lineObj of lineObjects) {
                const splitWords = Array.isArray(lineObj?.splittedWords) ? lineObj.splittedWords : [];
                splitWordCount += splitWords.length;
                for (const splitWord of splitWords) {
                    if (splitWord?.shouldEmphasize === true) {
                        emphasizedWordCount += 1;
                    }
                    subElementCount += Array.isArray(splitWord?.subElements)
                        ? splitWord.subElements.length
                        : 0;
                    auxiliaryAnimationRefs += [
                        splitWord?.elementAnimations,
                        splitWord?.maskAnimations,
                        splitWord?.__fsSourceElementAnimations,
                        splitWord?.__fsInstalledElementAnimations,
                        splitWord?.__fsInstalledMaskAnimations,
                        splitWord?.__fsGlowAnimations,
                        splitWord?.__cbInstalledElementAnimations,
                        splitWord?.__cbInstalledMaskAnimations,
                        splitWord?.__cbGlowAnimations,
                    ].reduce(
                        (count, list) => count + (Array.isArray(list) ? list.length : 0),
                        0
                    );
                    auxiliaryNodeRefs += [
                        splitWord?.__fsGlowLayer,
                        splitWord?.__cbGlowLayer,
                        splitWord?.__fsWordStackElement,
                        splitWord?.__cbWordStackElement,
                        splitWord?.__fsBaseWordElement,
                        splitWord?.__cbBaseWordElement,
                    ].filter((node) => node instanceof Node).length;
                }
            }

            const playerAnimations = typeof playerElement.getAnimations === "function"
                ? playerElement.getAnimations({ subtree: true })
                : [];
            const documentAnimations = typeof document.getAnimations === "function"
                ? document.getAnimations()
                : [];
            const performanceMemory = performance?.memory ?? null;

            return {
                label,
                role: surfaceRole,
                bundleVersion: AMLL_BUNDLE_VERSION,
                ttmlLength: lastTTML.length,
                dom: {

                        fullscreenOpaqueLyricsMode === true || fullscreenCoverBlurMode === true;
                    if (!externalIsPlaying && !needsForce && !isFullscreenSurface && timeDelta <= 500) {
                        return;
                    }
	                
	                originalSetCurrentTime(timeInMs, needsForce || timeDelta > 500);
                    externalTimeMs = timeInMs;
                    externalTimeAnchorPerfMs = performance.now();
	            },
	            
	            setPlaying: (isPlaying) => {
                    externalIsPlaying = !!isPlaying;
                    externalTimeMs = Number.isFinite(lastKnownTimeMs) ? lastKnownTimeMs : externalTimeMs;
                    externalTimeAnchorPerfMs = performance.now();
                    if (externalIsPlaying) {
                        if (typeof lyricPlayer.resume === "function") {
                            lyricPlayer.resume();
                        }
                    } else if (typeof lyricPlayer.pause === "function") {
                        lyricPlayer.pause();
                    }
	            },

	            setConfig: (config) => {
		                try {
                            const hasOwn = (key) => Object.prototype.hasOwnProperty.call(config, key);
		                    let needsLyricsReload = false;
		                    if (typeof config.leadInMs === "number" && !Number.isNaN(config.leadInMs)) {
		                        const nextLeadInMs = Math.max(0, Math.min(1600, config.leadInMs));
		                        if (nextLeadInMs !== leadInMs) {
		                            leadInMs = nextLeadInMs;
		                            syncLeadTimingConfig();
		                            needsLyricsReload = true;
		                        }
		                    }
		                    if (typeof config.nearSwitchGapMs === "number" && !Number.isNaN(config.nearSwitchGapMs)) {
		                        const nextNearSwitchGapMs = Math.max(0, Math.min(800, config.nearSwitchGapMs));
		                        if (nextNearSwitchGapMs !== nearSwitchGapMs) {
		                            nearSwitchGapMs = nextNearSwitchGapMs;
		                            syncLeadTimingConfig();
		                            needsLyricsReload = true;
		                        }
		                    }
		                    if (typeof config.enableBlur === "boolean" && config.enableBlur !== blurEnabled) {
		                        blurEnabled = config.enableBlur;
		                        if (typeof lyricPlayer.setEnableBlur === "function") {
		                            lyricPlayer.setEnableBlur(blurEnabled);
		                        }
		                    }
		                    if (typeof config.enableSpring === "boolean" && config.enableSpring !== springEnabled) {
		                        springEnabled = config.enableSpring;
		                        if (typeof lyricPlayer.setEnableSpring === "function") {
		                            lyricPlayer.setEnableSpring(springEnabled);
		                        }
		                    }
                            let renderScaleDidChange = false;
		                    if (typeof config.renderScale === "number" && !Number.isNaN(config.renderScale)) {
		                        const nextRenderScale = Math.max(0.35, Math.min(1.0, config.renderScale));
		                        if (nextRenderScale !== renderScale && typeof lyricPlayer.setRenderScale === "function") {
		                            renderScale = nextRenderScale;
		                            lyricPlayer.setRenderScale(renderScale);
                                    renderScaleDidChange = true;
		                        }
		                    }
                            if (renderScaleDidChange || hasOwn("renderScale")) {
                                requestAnimationFrame(() => logScaleMetrics("setConfig"));
                            }
		                    if (typeof config.fpsCap === "number" && !Number.isNaN(config.fpsCap)) {
		                        const nextFPSCap = Math.max(0, Math.min(120, Math.round(config.fpsCap)));
		                        if (nextFPSCap !== fpsCap && typeof lyricPlayer.setFPS === "function") {
		                            fpsCap = nextFPSCap;
		                            lyricPlayer.setFPS(fpsCap);
		                        }
		                    }
		                    if (typeof config.overscanPx === "number" && !Number.isNaN(config.overscanPx)) {
		                        const nextOverscanPx = Math.max(0, Math.min(600, Math.round(config.overscanPx)));
		                        if (nextOverscanPx !== overscanPx && typeof lyricPlayer.setOverscanPx === "function") {
		                            overscanPx = nextOverscanPx;
		                            lyricPlayer.setOverscanPx(overscanPx);
		                        }
		                    }
		                    if (typeof config.wordFadeWidth === "number" && !Number.isNaN(config.wordFadeWidth)) {
		                        const nextWordFadeWidth = Math.max(0.0001, Math.min(1.5, config.wordFadeWidth));
		                        if (nextWordFadeWidth !== wordFadeWidth && typeof lyricPlayer.setWordFadeWidth === "function") {
		                            wordFadeWidth = nextWordFadeWidth;
		                            lyricPlayer.setWordFadeWidth(wordFadeWidth);
		                        }
		                    }
                            if (
                                (hasOwn("wordHighlightMode") || hasOwn("discreteWordHighlightEnabled"))
                            ) {
                                const nextWordHighlightMode =
                                    config.wordHighlightMode === "discrete" || config.discreteWordHighlightEnabled === true
                                        ? "discrete"
                                        : "smooth";
                                if (typeof lyricPlayer.setWordHighlightMode === "function") {
                                    if (nextWordHighlightMode !== wordHighlightMode) {
                                        wordHighlightMode = nextWordHighlightMode;
                                        lyricPlayer.setWordHighlightMode(wordHighlightMode);
                                        syncWordHighlightModeRootState();
                                    }
                                } else {
                                    if (nextWordHighlightMode === "discrete") {
                                        logUpgradeOnce(
                                            "wordHighlightMode-discrete-ignored",
                                            `${AMLL_DOWNGRADE_LOG_PREFIX} discrete wordHighlightMode requested but core API is missing; keeping smooth behavior`,
                                            "warn"
                                        );
                                    }
                                    wordHighlightMode = "smooth";
                                    syncWordHighlightModeRootState();
                                }
                            }
		                    // Apply config to lyricPlayer
		                    if (typeof config.fontSize === "number" && !Number.isNaN(config.fontSize)) {
                                const nextFontSize = Math.max(6, Math.min(240, config.fontSize));
		                        lyricPlayer.getElement().style.setProperty("--amll-lp-font-size", `${nextFontSize}px`);
                                if (lastAppliedFontSizePx === null || Math.abs(nextFontSize - lastAppliedFontSizePx) > 0.25) {
                                    lastAppliedFontSizePx = nextFontSize;
                                    scheduleFontMetricsLayout();
                                }
		                    }
	                    if (config.fontWeight) {
	                        lyricPlayer.getElement().style.setProperty("--amll-lp-main-font-weight", `${config.fontWeight}`);
	                    }
	                    if (config.translationFontWeight) {
	                        lyricPlayer.getElement().style.setProperty(
	                            "--amll-lp-translation-font-weight",
	                            `${config.translationFontWeight}`
	                        );
	                    }
	                    if (typeof config.translationFontSize === "number" && !Number.isNaN(config.translationFontSize)) {
                            const nextTranslationFontSize = Math.max(6, Math.min(240, config.translationFontSize));
	                        lyricPlayer.getElement().style.setProperty(
	                            "--amll-lp-translation-font-size",
	                            `${nextTranslationFontSize}px`
	                        );
                            if (
                                lastAppliedTranslationFontSizePx === null
                                || Math.abs(nextTranslationFontSize - lastAppliedTranslationFontSizePx) > 0.25
                            ) {
                                lastAppliedTranslationFontSizePx = nextTranslationFontSize;
                                scheduleFontMetricsLayout();
                            }
	                    }
	                    if (config.fontFamilyMain) {
	                        lyricPlayer.getElement().style.setProperty("--amll-lp-main-font-family", config.fontFamilyMain);
	                    }
	                    if (config.fontFamilyTranslation) {
	                        lyricPlayer.getElement().style.setProperty(
	                            "--amll-lp-translation-font-family",
	                            config.fontFamilyTranslation
	                        );
	                    }
                        const playerElement = lyricPlayer.getElement();
                        const previousFullscreenOpaqueLyricsMode = fullscreenOpaqueLyricsMode;
                        const previousCoverBlurMode = fullscreenCoverBlurMode;
                        const previousCoverBlurProfile = fullscreenCoverBlurProfile;
                        const previousCoverBlurRenderLayer = fullscreenCoverBlurRenderLayer;
                        const previousCoverBlurBaseHideActive = fullscreenCoverBlurBaseHideActive;
                        const previousCoverBlurSuppressEmphasisGlow = fullscreenCoverBlurSuppressEmphasisGlow;
                        const previousGenericCoverBlurEnabled = fullscreenCoverBlurGenericState.enabled;
                        const previousGenericCoverBlurProfile = fullscreenCoverBlurGenericState.profile;
                        const previousGenericCoverBlurThemeColor = fullscreenCoverBlurGenericState.themeColor;

                        if (hasOwn("fullscreenCoverBlurMode")) {
                            fullscreenCoverBlurMode = isFullscreenSurface && config.fullscreenCoverBlurMode === true;
                        }
                        if (hasOwn("fullscreenCoverBlurProfile") && isValidCoverBlurProfile(config.fullscreenCoverBlurProfile)) {
                            fullscreenCoverBlurProfile = config.fullscreenCoverBlurProfile;
                        }
                        if (hasOwn("coverBlurRenderLayer") && isValidCoverBlurRenderLayer(config.coverBlurRenderLayer)) {
                            fullscreenCoverBlurRenderLayer = config.coverBlurRenderLayer;
                        }
                        if (hasOwn("coverBlurHideActiveMainLine")) {
                            fullscreenCoverBlurBaseHideActive =
                                surfaceRole === "fullscreen"
                                && config.coverBlurHideActiveMainLine === true;
                        }
                        if (hasOwn("coverBlurSuppressEmphasisGlow")) {
                            fullscreenCoverBlurSuppressEmphasisGlow =
                                isFullscreenSurface
                                && config.coverBlurSuppressEmphasisGlow === true;
                        }
                        if (hasOwn("coverBlurFullscreenGenericMode")) {
                            fullscreenCoverBlurGenericState.enabled =
                                isFullscreenSurface && config.coverBlurFullscreenGenericMode === true;
                        }
                        if (hasOwn("coverBlurFullscreenGenericProfile")) {
                            fullscreenCoverBlurGenericState.profile = isValidCoverBlurProfile(
                                config.coverBlurFullscreenGenericProfile
                            ) ? config.coverBlurFullscreenGenericProfile : null;
                        }
	                        if (hasOwn("coverBlurFullscreenThemeColor")) {
	                            fullscreenCoverBlurGenericState.themeColor =
	                                typeof config.coverBlurFullscreenThemeColor === "string"
	                                && config.coverBlurFullscreenThemeColor.length > 0
	                                    ? config.coverBlurFullscreenThemeColor
	                                    : null;
	                        }
	                        if (hasOwn("fullscreenAppleStyleMode")) {
	                            playerElement.classList.toggle(
	                                "amll-surface-fullscreen-apple-style",
	                                isFullscreenSurface && config.fullscreenAppleStyleMode === true
	                            );
	                        }

	                        if (hasOwn("fullscreenLyricDodgeMode")) {
                            const requestedOpaque =
                                isFullscreenSurface && config.fullscreenLyricDodgeMode === true;
                            fullscreenOpaqueLyricsMode = !fullscreenCoverBlurMode && requestedOpaque;
                            if (fullscreenOpaqueLyricsMode) {
                                startFullscreenCompositingGuard();
                                syncWordFadeWidth();
                                playerElement.classList.add("amll-surface-fullscreen");
                                enforceFullscreenNormalCompositing();
                                patchFullscreenLineOpacityBehavior();
                            } else {
                                syncWordFadeWidth();
                                stopFullscreenCompositingGuard();
	                                playerElement.classList.remove("amll-surface-fullscreen");
	                                playerElement.classList.remove("amll-surface-fullscreen-apple-style");
	                                playerElement.classList.remove("fs-color-dodge");
                                if (!fullscreenCoverBlurMode) {
                                    playerElement.classList.remove("fs-line-timing-only");
                                }
                                removeStyleVars(playerElement, fullscreenColorVarNames);
                                removeStyleVars(playerElement, fullscreenDerivedColorVarNames);
                            }
                        }
                        syncCoverBlurRootState();
                        syncFullscreenCoverBlurGenericRootState();
	                        if (hasOwn("mixBlendMode")) {
	                            if (fullscreenOpaqueLyricsMode) {
	                                enforceFullscreenNormalCompositing();
	                            } else if (fullscreenCoverBlurMode) {
	                                syncCoverBlurRootState();
	                            } else if (typeof config.mixBlendMode === "string" && config.mixBlendMode.length > 0) {
	                                document.documentElement.style.setProperty("--amll-lp-mix-blend-mode", config.mixBlendMode);
	                                playerElement.style.setProperty("mix-blend-mode", config.mixBlendMode, "important");
	                            } else {
	                                document.documentElement.style.removeProperty("--amll-lp-mix-blend-mode");
	                                playerElement.style.removeProperty("mix-blend-mode");
	                            }
	                        }

	                        if (hasOwn("blendOpacity")) {
	                            if (fullscreenOpaqueLyricsMode) {
	                                enforceFullscreenNormalCompositing();
	                            } else if (fullscreenCoverBlurMode) {
	                                syncCoverBlurRootState();
	                            } else if (typeof config.blendOpacity === "number" && !Number.isNaN(config.blendOpacity)) {
	                                const nextOpacity = Math.max(0, Math.min(1, config.blendOpacity));
	                                document.documentElement.style.setProperty("--amll-lp-mix-opacity", `${nextOpacity}`);
	                                playerElement.style.opacity = `${nextOpacity}`;
	                            } else {
	                                document.documentElement.style.removeProperty("--amll-lp-mix-opacity");
	                                playerElement.style.removeProperty("opacity");
	                            }
	                        }

                        if (fullscreenOpaqueLyricsMode) {
                            enforceFullscreenNormalCompositing();
                            patchFullscreenLineOpacityBehavior();
                            enforceFullscreenOpaqueColorVars();
                        } else if (fullscreenCoverBlurMode) {
                            syncCoverBlurRootState();
                        }

                        const applyFullscreenColorVar = (key, cssVarName) => {
                            if (!hasOwn(key)) return;
                            if (!isFullscreenSurface) {
                                playerElement.style.removeProperty(cssVarName);
                                return;
                            }
                            if (typeof config[key] === "string" && config[key].length > 0) {
                                const resolved = fullscreenOpaqueLyricsMode
                                    ? toOpaqueColor(config[key])
                                    : config[key];
                                playerElement.style.setProperty(cssVarName, resolved);
                            } else {
                                playerElement.style.removeProperty(cssVarName);
                            }
                        };
                        const applyCoverBlurColorVar = (key, cssVarName) => {
                            if (!hasOwn(key)) return;
                            if (!isFullscreenSurface) {
                                playerElement.style.removeProperty(cssVarName);
                                return;
                            }
                            if (typeof config[key] === "string" && config[key].length > 0) {
                                playerElement.style.setProperty(cssVarName, config[key]);
                            } else {
                                playerElement.style.removeProperty(cssVarName);
                            }
                        };
                        applyFullscreenColorVar("fullscreenActiveColor", "--amll-fs-main-active");
                        applyFullscreenColorVar("fullscreenInactiveColor", "--amll-fs-main-inactive");
                        applyFullscreenColorVar("fullscreenSubActiveColor", "--amll-fs-sub-active");
                        applyFullscreenColorVar("fullscreenSubInactiveColor", "--amll-fs-sub-inactive");
                        applyFullscreenColorVar("fullscreenBackgroundColor", "--amll-fs-bg-active");
                        applyFullscreenColorVar("fullscreenEmphasisGlowColor", "--amll-fs-emphasis-glow");
                        applyFullscreenColorVar(
                            "fullscreenLineTimingInactiveColor",
                            "--amll-fs-main-line-timing-inactive"
                        );
                        applyFullscreenColorVar(
                            "fullscreenLineTimingSubInactiveColor",
                            "--amll-fs-sub-line-timing-inactive"
                        );
                        applyCoverBlurColorVar("coverBlurMainActiveColor", "--amll-cb-main-active");
                        applyCoverBlurColorVar("coverBlurMainInactiveColor", "--amll-cb-main-inactive");
                        applyCoverBlurColorVar("coverBlurSubActiveColor", "--amll-cb-sub-active");
                        applyCoverBlurColorVar("coverBlurSubInactiveColor", "--amll-cb-sub-inactive");
                        applyCoverBlurColorVar("coverBlurBackgroundColor", "--amll-cb-bg-active");
                        applyCoverBlurColorVar(
                            "coverBlurLineTimingInactiveColor",
                            "--amll-cb-main-line-timing-inactive"
                        );
                        applyCoverBlurColorVar(
                            "coverBlurLineTimingSubInactiveColor",
                            "--amll-cb-sub-line-timing-inactive"
                        );
                        syncFullscreenDerivedColors();
                        syncFullscreenCoverBlurGenericRootState();
	                    if (typeof config.alignAnchor === "string" && typeof lyricPlayer.setAlignAnchor === "function") {
	                        lyricPlayer.setAlignAnchor(config.alignAnchor);
	                    }
	                    if (typeof config.alignPosition === "number" && !Number.isNaN(config.alignPosition)) {
	                        const nextAlignPosition = Math.max(0, Math.min(1, config.alignPosition));
	                        if (typeof lyricPlayer.setAlignPosition === "function") {
	                            lyricPlayer.setAlignPosition(nextAlignPosition);
	                        }
	                    }
					    // alignOffset: additional pixel offset for current line position (negative = up).
					    // No CSS transition here — Swift already owns the viewport geometry animation.
					    // Applying a CSS spring on top of the SwiftUI spring creates two independent
					    // spring systems fighting each other (the double-animation jerk). Swift sends
					    // this update only after its animation has settled, so an instant snap is
					    // correct; AMLL's internal setAlignPosition spring handles smooth line
					    // repositioning within the now-stable viewport.
					    if (typeof config.alignOffset === "number" && !Number.isNaN(config.alignOffset)) {
					        const playerEl = lyricPlayer.getElement();
					        if (playerEl) {
					            if (Math.abs(config.alignOffset) <= 0.001) {
					                playerEl.style.removeProperty("transition");
					                playerEl.style.removeProperty("transform");
					            } else {
					                playerEl.style.transition = "none";
					                playerEl.style.transform = `translateY(${config.alignOffset}px)`;
					            }
					        }
					    }
                    if (hasOwn("textColor")) {
                        if (typeof config.textColor === "string" && config.textColor.length > 0) {
                            const resolvedTextColor = fullscreenOpaqueLyricsMode
                                ? toOpaqueColor(config.textColor)
                                : config.textColor;
                            lyricPlayer.getElement().style.setProperty("--amll-lp-color", resolvedTextColor);
                        } else {
                            lyricPlayer.getElement().style.removeProperty("--amll-lp-color");
                        }
                    }
                    // Window emphasis halo scheme is driven by the app appearance signal
                    // (config.theme), not by textColor luma. Swift sends "light" or "dark"
                    // on every config/theme push, so this branch is the canonical place
                    // for window emphasis glow scheme transitions.
                    if (isMainSurface && hasOwn("theme")) {
                        const nextScheme = config.theme === "light" ? "light" : "dark";
                        if (nextScheme !== windowEmphasisGlowScheme) {
                            windowEmphasisGlowScheme = nextScheme;
                            applyWindowEmphasisGlowScheme(nextScheme);
                        }
                    }
	                    if (typeof config.timeOffsetMs === "number" && !Number.isNaN(config.timeOffsetMs)) {
	                        const nextTimeOffsetMs = Math.max(-15000, Math.min(15000, config.timeOffsetMs));
	                        if (nextTimeOffsetMs !== timeOffsetMs) {
	                            timeOffsetMs = nextTimeOffsetMs;
	                            needsLyricsReload = true;
	                        }
	                    }
	                    if (typeof config.seekTimeOffsetMs === "number" && !Number.isNaN(config.seekTimeOffsetMs)) {
	                        const nextSeekTimeOffsetMs = Math.max(-15000, Math.min(15000, config.seekTimeOffsetMs));
	                        if (nextSeekTimeOffsetMs !== seekTimeOffsetMs) {
	                            seekTimeOffsetMs = nextSeekTimeOffsetMs;
	                            needsLyricsReload = true;
	                        }
	                    }
                        const switchedIntoCoverBlur = fullscreenCoverBlurMode && !previousCoverBlurMode;
                        const switchedOutOfCoverBlur = previousCoverBlurMode && !fullscreenCoverBlurMode;
                        const switchedBetweenFullscreenModes =
                            previousFullscreenOpaqueLyricsMode !== fullscreenOpaqueLyricsMode;
                        const coverBlurProfileChanged = previousCoverBlurProfile !== fullscreenCoverBlurProfile;
                        const coverBlurRenderLayerChanged =
                            previousCoverBlurRenderLayer !== fullscreenCoverBlurRenderLayer;
                        const coverBlurBaseHideActiveChanged =
                            previousCoverBlurBaseHideActive !== fullscreenCoverBlurBaseHideActive;
                        const coverBlurSuppressEmphasisGlowChanged =
                            previousCoverBlurSuppressEmphasisGlow !== fullscreenCoverBlurSuppressEmphasisGlow;
                        const genericCoverBlurChanged =
                            previousGenericCoverBlurEnabled !== fullscreenCoverBlurGenericState.enabled
                            || previousGenericCoverBlurProfile !== fullscreenCoverBlurGenericState.profile
                            || previousGenericCoverBlurThemeColor !== fullscreenCoverBlurGenericState.themeColor;
                        if ((switchedIntoCoverBlur || switchedOutOfCoverBlur || switchedBetweenFullscreenModes) && lastTTML) {
                            needsLyricsReload = true;
                        }
                        if (fullscreenCoverBlurMode && !needsLyricsReload) {
                            patchCoverBlurLineBehavior();
                            if (coverBlurProfileChanged || coverBlurRenderLayerChanged) {
                                applyCoverBlurFinalLayerStyles();
                            }
                        } else if (genericCoverBlurChanged && fullscreenOpaqueLyricsMode) {
                            refreshFullscreenCoverBlurGenericGlowLayers();
                        } else if (coverBlurSuppressEmphasisGlowChanged && fullscreenOpaqueLyricsMode) {
                            refreshFullscreenCoverBlurGenericGlowLayers();
                        } else if (coverBlurSuppressEmphasisGlowChanged) {
                            syncFullscreenCoverBlurGenericRootState();
                        } else if (coverBlurBaseHideActiveChanged) {
                            syncCoverBlurRootState();
                        }
	                    if (needsLyricsReload && lastTTML) {
	                        window.LyricsRenderer.setLyrics(lastTTML);
	                    }
		                    console.log("[LyricsRenderer] Config updated:", config);
		                } catch (e) {
		                    console.error("[LyricsRenderer] Config Error:", e);
		                }
		            },

            beginTrackProfileSession: (session = {}) => {
                activeTrackProfileSession = createTrackProfileSession(session);
                restartFirstVisibleLineProbe();
                return {
                    sessionID: activeTrackProfileSession.sessionID,
                    trackID: activeTrackProfileSession.trackID,
                    startedAtMs: activeTrackProfileSession.startedAtMs,
                };
            },

            collectTrackProfileSession: () => {
                if (!activeTrackProfileSession) return null;
                captureFirstVisibleLine("collect");
                return {
                    sessionID: activeTrackProfileSession.sessionID,
                    trackID: activeTrackProfileSession.trackID,
                    role: activeTrackProfileSession.role,
                    ttmlLength: activeTrackProfileSession.ttmlLength,
                    currentTime: activeTrackProfileSession.currentTime,
                    isPlaying: activeTrackProfileSession.isPlaying,
                    setLyricsCount: activeTrackProfileSession.setLyricsCount,
                    setLyricsDurationMs: Math.round(activeTrackProfileSession.setLyricsDurationMs * 100) / 100,
                    clearRendererStateCount: activeTrackProfileSession.clearRendererStateCount,
                    clearRendererStateDurationMs: Math.round(activeTrackProfileSession.clearRendererStateDurationMs * 100) / 100,
                    setLyricLinesCount: activeTrackProfileSession.setLyricLinesCount,
                    calcLayoutCount: activeTrackProfileSession.calcLayoutCount,
                    calcLayoutDurationMs: Math.round(activeTrackProfileSession.calcLayoutDurationMs * 100) / 100,
                    domRebuildCount: activeTrackProfileSession.domRebuildCount,
                    maskRebuildCount: activeTrackProfileSession.maskRebuildCount,
                    maskRebuildDurationMs: Math.round(activeTrackProfileSession.maskRebuildDurationMs * 100) / 100,
                    resizeObserverCallbackCount: activeTrackProfileSession.resizeObserverCallbackCount,
                    resizeObserverEntryCount: activeTrackProfileSession.resizeObserverEntryCount,
                    firstVisibleLineMs: activeTrackProfileSession.firstVisibleLineMs === null
                        ? null
                        : Math.round(activeTrackProfileSession.firstVisibleLineMs * 100) / 100,
                    firstVisibleLineSource: activeTrackProfileSession.firstVisibleLineSource,
                    firstVisibleLineText: activeTrackProfileSession.firstVisibleLineText,
                    clearReasons: activeTrackProfileSession.clearReasons,
                };
            },

            clearState: () => clearRendererState("bridge-clearState"),

            destroy: () => destroyRendererState(),

            collectDiagnostics: (label = "") => {
                const diagnostics = collectRendererDiagnostics(label);
                console.log(`[LyricsRenderer][Diagnostics] ${label} ${JSON.stringify(diagnostics)}`);
                return diagnostics;
            },
        };

        // Animation Loop
        let lastTime = performance.now();
        function animate(time) {
            if (rendererRuntime.destroyed) {
                rendererRuntime.animationFrameRequestId = 0;
                return;
            }
            const delta = time - lastTime;
            lastTime = time;
            if (externalIsPlaying) {
                const predictedTimeMs = Math.max(
                    0,
                    Math.floor(externalTimeMs + (time - externalTimeAnchorPerfMs))
                );
                // Keep AMLL progression smooth in JS without requiring high-frequency Swift updates.
                if (Math.abs(predictedTimeMs - lastKnownTimeMs) >= 1) {
                    originalSetCurrentTime(predictedTimeMs, false);
                }
            }
            lyricPlayer.update(delta);
            rendererRuntime.animationFrameRequestId = requestAnimationFrame(animate);
        }
        rendererRuntime.animationFrameRequestId = requestAnimationFrame(animate);

        // Notify bridge that renderer is ready (after LyricsRenderer defined)
        console.log("[AMLL-BOOT] renderer bootstrap complete; notifying bridge ready");
        if (window.AMLL && typeof window.AMLL._onRendererReady === "function") {
            window.AMLL._onRendererReady();
        } else {
            console.warn("[LyricsRenderer] AMLL bridge not ready");
        }

    </script>
</body>
</html>
