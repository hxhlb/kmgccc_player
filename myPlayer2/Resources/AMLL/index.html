                    && line.words[0].startTime === 0
                    && line.words[0].endTime === 0

                    line.words[0].endTime = line.endTime;

                    const firstWord = line.words[0];
                    const lastWord = line.words[line.words.length - 1];

                    }

        };

        const syncMainAndBackgroundLineTimes = (lines) => {
            for (let i = lines.length - 1; i >= 0; i -= 1) {
                const line = lines[i];
                if (!line || line.isBG) continue;
                const nextLine = lines[i + 1];
                if (!nextLine?.isBG) continue;
                const allWords = [...(line.words || []), ...(nextLine.words || [])].filter(
                    (word) => typeof word?.word === "string" && word.word.trim().length > 0
                );
                if (allWords.length === 0) continue;
                const minStart = Math.min(...allWords.map((word) => word.startTime));
                const maxEnd = Math.max(...allWords.map((word) => word.endTime));
                const finalStart = Math.min(minStart, line.startTime, nextLine.startTime);
                const finalEnd = Math.max(maxEnd, line.endTime, nextLine.endTime);
                line.startTime = finalStart;
                line.endTime = finalEnd;
                nextLine.startTime = finalStart;
                nextLine.endTime = finalEnd;
            }
        };

        const cleanUnintentionalLineOverlaps = (lines) => {
            for (let i = 0; i < lines.length - 1; i += 1) {
                const line = lines[i];
                if (!line || line.isBG) continue;
                let nextMainIndex = i + 1;
                while (nextMainIndex < lines.length && lines[nextMainIndex]?.isBG) {
                    nextMainIndex += 1;
                }
                if (nextMainIndex >= lines.length) continue;
                const nextLine = lines[nextMainIndex];
                const overlap = line.endTime - nextLine.startTime;
                if (!(overlap > 0)) continue;

                const isIntentionalOverlap = overlap > 100 && overlap > nextDuration * 0.1;
                if (isIntentionalOverlap) continue;

            }
            const meaningfulIndexes = [];
            for (let i = 0; i < line.words.length; i += 1) {
                const word = line.words[i];
                if (
                    typeof word?.word === "string"
                    && word.word.trim().length > 0
                    && Number.isFinite(word.startTime)
                    && Number.isFinite(word.endTime)
                    && word.endTime >= word.startTime

                    meaningfulIndexes.push(i);

                }
            }
            if (meaningfulIndexes.length === 0) return;
            const lastIndex = meaningfulIndexes[meaningfulIndexes.length - 1];
            const frontWords = line.words.slice(0, lastIndex + 1).filter((word) => (
                Number.isFinite(word?.startTime)
                && Number.isFinite(word?.endTime)
                && word.endTime >= word.startTime
            ));
            if (frontWords.length === 0) return;
            const segmentStart = frontWords[0].startTime;

                segmentStart + 1,

            for (let i = 0; i <= lastIndex; i += 1) {

                    !Number.isFinite(word?.startTime)
                    || !Number.isFinite(word?.endTime)
                    || word.endTime < word.startTime

                const startProgress = Math.max(
                    0,
                    Math.min(1, (word.startTime - segmentStart) / segmentDuration)

                const endProgress = Math.max(
                    startProgress,
                    Math.min(1, (word.endTime - segmentStart) / segmentDuration)

                    line.startTime,
                    word.startTime - effectiveLeadIn * (1 - startProgress)

                    ? rect.left - x
                    : (x > rect.right ? x - rect.right : 0);
                const centerY = (rect.top + rect.bottom) / 2;

            if (!lineLike && !Number.isInteger(lineIndex)) return;
            const start = getSeekLineStart(lineLike, lineIndex);
            if (start === undefined || Number.isNaN(start)) return;

            const currentMs = typeof lyricPlayer.getCurrentTime === "function"
                ? lyricPlayer.getCurrentTime()
                : 0;
            const looksLikeMs = start > 1000 || (currentMs > 0 && Math.abs(start - currentMs) < 5000);
            const seconds = looksLikeMs ? start / 1000 : start;

            const now = performance.now();
            if (lastSeekSeconds !== null && Math.abs(seconds - lastSeekSeconds) < 0.01 && now - lastSeekAt < 250) {
                return;
            }
            lastSeekAt = now;
            lastSeekSeconds = seconds;

            if (window.AMLL && typeof window.AMLL._onUserSeek === "function") {
                window.AMLL._onUserSeek(seconds);
            } else if (window.webkit?.messageHandlers?.onUserSeek) {
                window.webkit.messageHandlers.onUserSeek.postMessage({ seconds });
            }
        };

        const dispatchHostWheelToAMLL = (payload = {}) => {
            const root = lyricPlayer.getElement();
            if (!(root instanceof HTMLElement)) return false;

            const deltaX = Number(payload.deltaX);
            const deltaY = Number(payload.deltaY);
            if (!Number.isFinite(deltaX) && !Number.isFinite(deltaY)) return false;

            const clientX = Number.isFinite(Number(payload.clientX)) ? Number(payload.clientX) : 0;
            const clientY = Number.isFinite(Number(payload.clientY)) ? Number(payload.clientY) : 0;
            const event = new WheelEvent("wheel", {
                bubbles: true,
                cancelable: true,
                view: window,
                deltaX: Number.isFinite(deltaX) ? deltaX : 0,
                deltaY: Number.isFinite(deltaY) ? deltaY : 0,
                deltaMode: WheelEvent.DOM_DELTA_PIXEL,
                clientX,
                clientY,
            });
            Object.defineProperty(event, "__amllWheelSource", {
                value: "hostWheel",
                configurable: true,
            });
            Object.defineProperty(event, "__amllWheelPayload", {
                value: payload,
                configurable: true,
            });

            const notCancelled = root.dispatchEvent(event);
            return event.defaultPrevented;
        };

        if (window.AMLL) {
            window.AMLL.hostWheel = dispatchHostWheelToAMLL;
        }

        if (scrollDiagnosticsEnabled) {
            lyricPlayer.getElement().addEventListener("wheel", (event) => {
                const payload = event.__amllWheelPayload || {};
                const target = event.target;
                const targetDescription = target instanceof HTMLElement
                    ? {
                        tagName: target.tagName,
                        id: target.id || "",
                        className: String(target.className || ""),
                    }
                    : String(target);
                console.log("[AMLLScroll][DOM]", {
                    role: surfaceRole,
                    renderQuality: Number.isFinite(Number(payload.scale))
                        ? Number(payload.scale)
                        : 1,
                    source: event.__amllWheelSource === "hostWheel"
                        ? "hostWheel"
                        : "native",
                    deltaX: event.deltaX,
                    deltaY: event.deltaY,
                    deltaMode: event.deltaMode,
                    clientX: event.clientX,
                    clientY: event.clientY,
                    target: targetDescription,
                    defaultPrevented: event.defaultPrevented,
                    appKitDeltaX: payload.appKitDeltaX,
                    appKitDeltaY: payload.appKitDeltaY,
                    appKitScrollingDeltaX: payload.appKitScrollingDeltaX,
                    appKitScrollingDeltaY: payload.appKitScrollingDeltaY,
                    inverted: payload.inverted,
                    phase: payload.phase,
                    momentumPhase: payload.momentumPhase,
                    precise: payload.precise,
                });
            });
        }

        const resolveLineFromTarget = (target) => {
            let node = target;
            const root = lyricPlayer.getElement();
            while (node && node !== root) {
                const lineObj = lyricPlayer.lyricLineElementMap?.get?.(node);
                if (lineObj?.getLine) return lineObj;
                node = node.parentElement;
            }
            return null;
        };

        const syncWordFadeWidth = () => {
            if (typeof lyricPlayer.setWordFadeWidth !== "function") return;
            lyricPlayer.setWordFadeWidth(defaultWordFadeWidth);
        };

        const toOpaqueColor = (value) => {
            if (typeof value !== "string") return value;
            const raw = value.trim();
            if (raw.length === 0) return value;

            const rgbaMatch = raw.match(
                /^rgba?\(\s*([^,]+)\s*,\s*([^,]+)\s*,\s*([^,)\s]+)(?:\s*,\s*[^)]+)?\s*\)$/i
            );
            if (rgbaMatch) {
                const red = rgbaMatch[1].trim();
                const green = rgbaMatch[2].trim();
                const blue = rgbaMatch[3].trim();
                return `rgb(${red}, ${green}, ${blue})`;
            }

            const hslaMatch = raw.match(
                /^hsla?\(\s*([^,]+)\s*,\s*([^,]+)\s*,\s*([^,)\s]+)(?:\s*,\s*[^)]+)?\s*\)$/i
            );
            if (hslaMatch) {
                const hue = hslaMatch[1].trim();
                const saturation = hslaMatch[2].trim();
                const lightness = hslaMatch[3].trim();
                return `hsl(${hue}, ${saturation}, ${lightness})`;
            }

            if (/^#[0-9a-f]{8}$/i.test(raw)) {
                return `#${raw.slice(1, 7)}`;
            }
            if (/^#[0-9a-f]{4}$/i.test(raw)) {
                return `#${raw.slice(1, 4)}`;
            }
            const css4RgbMatch = raw.match(/^rgb(a)?\((.+)\)$/i);
            if (css4RgbMatch) {
                const body = css4RgbMatch[2];
                if (body.includes("/")) {
                    return `rgb(${body.split("/")[0].trim()})`;
                }
            }
            const css4HslMatch = raw.match(/^hsl(a)?\((.+)\)$/i);
            if (css4HslMatch) {
                const body = css4HslMatch[2];
                if (body.includes("/")) {
                    return `hsl(${body.split("/")[0].trim()})`;
                }
            }
            const cssColorFnMatch = raw.match(/^color\((.+)\)$/i);
            if (cssColorFnMatch && cssColorFnMatch[1].includes("/")) {
                return `color(${cssColorFnMatch[1].split("/")[0].trim()})`;
            }
            return raw;
        };

        const fullscreenColorVarNames = [
            "--amll-fs-main-active",
            "--amll-fs-main-inactive",
            "--amll-fs-sub-active",
            "--amll-fs-sub-inactive",
            "--amll-fs-main-line-timing-inactive",
            "--amll-fs-sub-line-timing-inactive",
            "--amll-fs-bg-active",
            "--amll-fs-emphasis-glow",
        ];
        const fullscreenDerivedColorVarNames = [
            "--amll-fs-sub-color",
            "--amll-fs-bg-inactive",
        ];
        const coverBlurDerivedColorVarNames = [
            "--amll-cb-sub-color",
            "--amll-cb-bg-inactive",
            "--amll-cb-bg-active",
        ];
        const removeStyleVars = (element, names) => {
            if (!(element instanceof HTMLElement) || !Array.isArray(names)) return;
            for (const name of names) {
                element.style.removeProperty(name);
            }
        };

        const enforceFullscreenOpaqueColorVars = () => {
            if (!fullscreenOpaqueLyricsMode || !isFullscreenSurface) return;
            const playerElement = lyricPlayer.getElement();
            const vars = [
                ...fullscreenColorVarNames,
                "--amll-lp-color",
            ];
            for (const name of vars) {
                const value = playerElement.style.getPropertyValue(name);
                if (!value || value.trim().length === 0) continue;
                playerElement.style.setProperty(name, toOpaqueColor(value));
            }
        };

        const coverBlurColorVarNames = [
            "--amll-cb-main-active",
            "--amll-cb-main-inactive",
            "--amll-cb-sub-active",
            "--amll-cb-sub-inactive",
            "--amll-cb-main-line-timing-inactive",
            "--amll-cb-sub-line-timing-inactive",
            "--amll-cb-bg-active",
        ];

        const isValidCoverBlurProfile = (value) => value === "lighter" || value === "darker";
        const isValidCoverBlurRenderLayer = (value) =>
            value === "base" || value === "highlight" || value === "full";

        const getCoverBlurMainBlendMode = () => (
            fullscreenCoverBlurProfile === "darker" ? "plus-darker" : "plus-lighter"
        );

        const getCoverBlurHighlightBlendMode = () => (
            "normal"
        );

        const applyExplicitCoverBlurBlend = (element, blendMode) => {
            if (!(element instanceof HTMLElement) || typeof blendMode !== "string" || blendMode.length === 0) {
                return;
            }
            element.style.setProperty("mix-blend-mode", blendMode, "important");
            element.dataset.amllCoverBlurBlend = blendMode;
        };

        const getFullscreenCoverBlurGenericProfile = () => (
            isValidCoverBlurProfile(fullscreenCoverBlurGenericState.profile)
                ? fullscreenCoverBlurGenericState.profile
                : null
        );

        const getFullscreenCoverBlurGenericThemeColor = () => {
            const value = fullscreenCoverBlurGenericState.themeColor;
            return typeof value === "string" && value.length > 0 ? value : null;
        };

        const isFullscreenCoverBlurGenericMode = () => (
            isFullscreenSurface
            && fullscreenOpaqueLyricsMode === true
            && fullscreenCoverBlurMode !== true
            && fullscreenCoverBlurGenericState.enabled === true
            && getFullscreenCoverBlurGenericProfile() !== null
        );

        const syncFullscreenCoverBlurGenericRootState = () => {
            const playerElement = lyricPlayer.getElement();
            if (!(playerElement instanceof HTMLElement)) return;

            const genericMode = isFullscreenCoverBlurGenericMode();
            const profile = getFullscreenCoverBlurGenericProfile();
            playerElement.classList.toggle("amll-surface-fullscreen-cover-blur-generic", genericMode);
            playerElement.classList.toggle(
                "amll-surface-fullscreen-cover-blur-suppress-glow",
                fullscreenCoverBlurSuppressEmphasisGlow === true
            );

            if (genericMode && profile) {
                playerElement.dataset.amllCoverBlurProfile = profile;
                playerElement.style.setProperty(
                    "--amll-cb-main-blend",
                    profile === "darker" ? "plus-darker" : "plus-lighter"
                );
                const themeColor = getFullscreenCoverBlurGenericThemeColor();
                if (themeColor) {
                    playerElement.style.setProperty("--amll-fs-cover-blur-theme-color", themeColor);
                } else {
                    playerElement.style.removeProperty("--amll-fs-cover-blur-theme-color");
                }
            } else if (!fullscreenCoverBlurMode) {
                delete playerElement.dataset.amllCoverBlurProfile;
                playerElement.style.removeProperty("--amll-cb-main-blend");
                playerElement.style.removeProperty("--amll-fs-cover-blur-theme-color");
            }
        };

        const syncCoverBlurRootState = () => {
            const playerElement = lyricPlayer.getElement();
            if (!(playerElement instanceof HTMLElement)) return;

            playerElement.classList.toggle("amll-surface-fullscreen-cover-blur", fullscreenCoverBlurMode);
            playerElement.classList.toggle(
                "amll-surface-fullscreen-cover-blur-base-hide-active",
                fullscreenCoverBlurBaseHideActive === true
            );
            if (fullscreenCoverBlurMode) {
                playerElement.classList.remove("amll-surface-fullscreen");
                playerElement.classList.remove("fs-color-dodge");
                playerElement.dataset.amllCoverBlurProfile = isValidCoverBlurProfile(fullscreenCoverBlurProfile)
                    ? fullscreenCoverBlurProfile
                    : "lighter";
                playerElement.dataset.amllCoverBlurRenderLayer = isValidCoverBlurRenderLayer(
                    fullscreenCoverBlurRenderLayer
                ) ? fullscreenCoverBlurRenderLayer : "full";
                document.documentElement.style.setProperty("--amll-lp-mix-blend-mode", "normal");
                document.documentElement.style.setProperty("--amll-lp-mix-opacity", "1");
                playerElement.style.setProperty("mix-blend-mode", "normal", "important");
                playerElement.style.setProperty("opacity", "1", "important");
                playerElement.style.textShadow = "none";
                playerElement.style.setProperty("--amll-cb-main-blend", getCoverBlurMainBlendMode());
                playerElement.style.setProperty("--amll-cb-highlight-blend", getCoverBlurHighlightBlendMode());
                playerElement.style.backgroundImage = "none";
                playerElement.style.backgroundColor = "transparent";
            } else {
                playerElement.classList.remove("amll-surface-fullscreen-cover-blur");
                delete playerElement.dataset.amllCoverBlurProfile;
                delete playerElement.dataset.amllCoverBlurRenderLayer;
                document.documentElement.style.removeProperty("--amll-lp-mix-blend-mode");
                document.documentElement.style.removeProperty("--amll-lp-mix-opacity");
                playerElement.style.removeProperty("mix-blend-mode");
                playerElement.style.removeProperty("opacity");
                playerElement.style.removeProperty("--amll-cb-main-blend");
                playerElement.style.removeProperty("--amll-cb-highlight-blend");
                removeStyleVars(playerElement, coverBlurColorVarNames);
                removeStyleVars(playerElement, coverBlurDerivedColorVarNames);
                playerElement.style.removeProperty("background-image");
                playerElement.style.removeProperty("background-color");
            }
            syncFullscreenDerivedColors();
        };

        const startFullscreenCompositingGuard = () => {};

        const stopFullscreenCompositingGuard = () => {
            const playerElement = lyricPlayer.getElement();
            if (!playerElement || fullscreenOpaqueLyricsMode) return;
            playerElement.classList.remove("amll-surface-fullscreen");
        };

        const enforceFullscreenNormalCompositing = () => {
            if (!fullscreenOpaqueLyricsMode) return;
            const playerElement = lyricPlayer.getElement();
            playerElement.classList.remove("amll-surface-fullscreen-cover-blur");
            playerElement.classList.add("amll-surface-fullscreen");
            document.documentElement.style.setProperty("--amll-lp-mix-blend-mode", "normal");
            document.documentElement.style.setProperty("--amll-lp-mix-opacity", "1");
            playerElement.style.setProperty("mix-blend-mode", "normal", "important");
            playerElement.style.setProperty("opacity", "1", "important");
            playerElement.style.textShadow = "none";
            enforceFullscreenOpaqueColorVars();
            syncFullscreenDerivedColors();
        };

        const parseRGBAColor = (value) => {
            if (typeof value !== "string") return null;
            const match = value.trim().match(/^rgba?\(([^)]+)\)$/i);
            if (!match) return null;
            const parts = match[1].split(",").map((part) => Number.parseFloat(part.trim()));
            if (parts.length < 3 || parts.some((part, index) => index < 3 && !Number.isFinite(part))) {
                return null;
            }
            const alpha = parts.length >= 4 && Number.isFinite(parts[3]) ? parts[3] : 1;
            return {
                r: Math.max(0, Math.min(255, parts[0])),
                g: Math.max(0, Math.min(255, parts[1])),
                b: Math.max(0, Math.min(255, parts[2])),
                a: Math.max(0, Math.min(1, alpha)),
            };
        };

        const formatRGBAColor = (color) => {
            if (!color) return null;
            return `rgba(${Math.round(color.r)}, ${Math.round(color.g)}, ${Math.round(color.b)}, ${Math.max(0, Math.min(1, color.a))})`;
        };

        const scaleRGBAColor = (color, options = {}) => {
            if (!color) return null;
            const brightnessMultiplier = Number.isFinite(options.brightnessMultiplier)
                ? options.brightnessMultiplier
                : 1;
            const alphaMultiplier = Number.isFinite(options.alphaMultiplier)
                ? options.alphaMultiplier
                : 1;
            return {
                r: Math.max(0, Math.min(255, color.r * brightnessMultiplier)),
                g: Math.max(0, Math.min(255, color.g * brightnessMultiplier)),
                b: Math.max(0, Math.min(255, color.b * brightnessMultiplier)),
                a: Math.max(0, Math.min(1, color.a * alphaMultiplier)),
            };
        };

        const deriveOpaqueColorFromMainColor = (value, brightnessMultiplier = 1) => {
            const opaqueValue = toOpaqueColor(value);
            const parsed = parseRGBAColor(opaqueValue);
            if (!parsed) return opaqueValue;
            const scaled = scaleRGBAColor(parsed, {
                brightnessMultiplier,
                alphaMultiplier: 1,
            });
            const formatted = formatRGBAColor(scaled);
            return formatted ? toOpaqueColor(formatted) : opaqueValue;
        };

        const resolveComputedOpaqueColor = (computedStyle, ...candidates) => {
            for (const candidate of candidates) {
                if (typeof candidate !== "string") continue;
                const raw = candidate.startsWith("--")
                    ? computedStyle?.getPropertyValue?.(candidate)
                    : candidate;
                if (typeof raw !== "string") continue;
                const trimmed = raw.trim();
                if (trimmed.length === 0) continue;
                return toOpaqueColor(trimmed);
            }
            return null;
        };

        const syncFullscreenDerivedColors = () => {
            const playerElement = lyricPlayer.getElement();
            if (!(playerElement instanceof HTMLElement) || !isFullscreenSurface) {
                removeStyleVars(playerElement, fullscreenDerivedColorVarNames);
                removeStyleVars(playerElement, coverBlurDerivedColorVarNames);
                return;
            }

            const computedStyle = window.getComputedStyle(playerElement);
            if (playerElement.classList.contains("amll-surface-fullscreen")) {
                const fsMainInactive = resolveComputedOpaqueColor(
                    computedStyle,
                    "--amll-fs-main-inactive",
                    "--amll-inactive",
                    computedStyle.color
                ) ?? "rgb(255, 255, 255)";
                const fsMainActive = resolveComputedOpaqueColor(
                    computedStyle,
                    "--amll-fs-main-active",
                    "--amll-active",
                    computedStyle.color
                ) ?? fsMainInactive;
                const fsSubInactive = resolveComputedOpaqueColor(
                    computedStyle,
                    "--amll-fs-sub-inactive",
                    fsMainInactive
                ) ?? fsMainInactive;
                playerElement.style.setProperty("--amll-fs-sub-color", fsSubInactive);
                playerElement.style.setProperty("--amll-fs-bg-inactive", fsMainInactive);
                const explicitFsBgActive = playerElement.style.getPropertyValue("--amll-fs-bg-active");
                if (typeof explicitFsBgActive !== "string" || explicitFsBgActive.trim().length === 0) {
                    playerElement.style.setProperty(
                        "--amll-fs-bg-active",
                        deriveOpaqueColorFromMainColor(fsMainActive, 0.84)
                    );
                }
            } else {
                removeStyleVars(playerElement, fullscreenDerivedColorVarNames);
            }

            if (playerElement.classList.contains("amll-surface-fullscreen-cover-blur")) {
                const cbMainInactive = resolveComputedOpaqueColor(
                    computedStyle,
                    "--amll-cb-main-inactive",
                    "--amll-inactive",
                    computedStyle.color
                ) ?? "rgb(255, 255, 255)";
                const cbMainActive = resolveComputedOpaqueColor(
                    computedStyle,
                    "--amll-cb-main-active",
                    "--amll-active",
                    computedStyle.color
                ) ?? cbMainInactive;
                const cbSubInactive = resolveComputedOpaqueColor(
                    computedStyle,
                    "--amll-cb-sub-inactive",
                    cbMainInactive
                ) ?? cbMainInactive;
                playerElement.style.setProperty("--amll-cb-sub-color", cbSubInactive);
                playerElement.style.setProperty("--amll-cb-bg-inactive", cbMainInactive);
                const explicitCbBgActive = playerElement.style.getPropertyValue("--amll-cb-bg-active");
                if (typeof explicitCbBgActive !== "string" || explicitCbBgActive.trim().length === 0) {
                    playerElement.style.setProperty(
                        "--amll-cb-bg-active",
                        deriveOpaqueColorFromMainColor(cbMainActive, 0.84)
                    );
                }
            } else {
                removeStyleVars(playerElement, coverBlurDerivedColorVarNames);
            }
        };

        const isEmphasisTextShadowAnimation = (animation) => {
            if (!(animation instanceof Animation)) return false;
            const id = typeof animation.id === "string" ? animation.id : "";
            return id.includes("emphasize-word-") && !id.includes("float");
        };

        const COVER_BLUR_EMPHASIS_GLOW_ALPHA_LIMIT = 0.2;
        // Decorative-only glow profile. Main emphasis visibility is now carried by the
        // body channel (data-amll-fs-emphasis-body); these values shape the halo only
        // and must NOT be tuned to compensate for missing main highlight visibility.
        // Source AMLL emphasis text-shadow may reach alpha 0.8. These profile values
        // keep the final cloned shadow well under 0.2 after retinting.
        const coverBlurGlowProfiles = {
            // lighter: subtle white halo, must not overexpose against the bright blur.
            lighter: {
                color: "rgba(255, 255, 255, 0.12)",
                alphaMultiplier: 1.0,
            },
            // darker: faint dark halo. plus-darker / dark cover composition consumes
            // bright halos; a low-alpha dark shadow keeps a perceptible decoration
            // without becoming the only source of emphasis visibility.
            darker: {
                color: "rgba(0, 0, 0, 0.16)",
                alphaMultiplier: 1.0,
            },
        };

        const resolveFullscreenCoverBlurGlowColor = (profile) => {
            if (profile !== "lighter" && profile !== "darker") return null;
            return coverBlurGlowProfiles[profile]?.color ?? null;
        };

        const resolveFullscreenCoverBlurGlowAlphaMultiplier = (profile) => {
            if (profile !== "lighter" && profile !== "darker") return 0.22;
            return coverBlurGlowProfiles[profile]?.alphaMultiplier ?? 0.22;
        };

        const recolorTextShadow = (textShadow, colorValue) => {
            if (typeof textShadow !== "string" || textShadow.length === 0) return textShadow;
            const targetColor = parseRGBAColor(colorValue);
            if (!targetColor) return textShadow;
            return textShadow.replace(/rgba?\(([^)]+)\)/gi, (match) => {
                const sourceColor = parseRGBAColor(match);
                const alpha = sourceColor ? sourceColor.a * targetColor.a : targetColor.a;
                return formatRGBAColor({
                    r: targetColor.r,
                    g: targetColor.g,
                    b: targetColor.b,
                    a: alpha,
                }) ?? match;
            });
        };

        const rescaleTextShadowAlpha = (textShadow, alphaMultiplier = 1) => {
            if (typeof textShadow !== "string" || textShadow.length === 0) return textShadow;
            if (!Number.isFinite(alphaMultiplier) || alphaMultiplier <= 0) return textShadow;
            return textShadow.replace(/rgba?\(([^)]+)\)/gi, (match) => {
                const sourceColor = parseRGBAColor(match);
                if (!sourceColor) return match;
                return formatRGBAColor({
                    r: sourceColor.r,
                    g: sourceColor.g,
                    b: sourceColor.b,
                    a: Math.max(0, Math.min(1, sourceColor.a * alphaMultiplier)),
                }) ?? match;
            });
        };

        // === Window/main emphasis glow color treatment ===
        // Upstream AMLL `initEmphasizeAnimation()` emits per-character emphasis keyframes
        // with `textShadow: "0 0 Xem rgba(255, 255, 255, glowLevel)"`. That white halo
        // looks correct for dark appearance (light text on dark background) but is
        // effectively invisible in light appearance: the dark glyph on a light surface
        // gets no perceivable halo.
        //
        // Window lyrics polarity is stable and driven entirely by the app appearance
        // signal: light appearance always renders dark text, dark appearance always
        // renders light text — even when an artwork-derived palette is in effect.
        // So the scheme is taken directly from `config.theme` ("light" | "dark"), which
        // Swift's LyricsViewModel/applyEffectiveTheme emits on every config push and on
        // every appearance flip. No luma heuristic is used; previous attempts to infer
        // the scheme from `config.textColor` luma raced with config ordering and left
        // the light-mode halo visually missing.
        //
        // Window mode owns no upstream API to recolor the emphasis halo, so the adapter
        // walks the live emphasis animations after `setLyricLines()` (and on scheme
        // flips) and rewrites the textShadow color via `KeyframeEffect.setKeyframes()`.
        // Timing, transform, easing, composite, duration, delay, and stagger stay
        // verbatim — only the textShadow color/alpha is touched.
        //
        // Only the `main` surface uses this path. Fullscreen, fullscreen cover-blur,
        // and batch preview surfaces are unaffected.
        //
        // Light-mode halo profile: pure black at 0.55× source alpha. Source peak alpha
        // is ~0.8, so the rewritten peak lands near 0.44 with the original 0.3em blur,
        // producing a clearly visible but refined drop-shadow weight under the glyph
        // without smudging neighbouring characters.
        const WINDOW_EMPHASIS_LIGHT_GLOW_BASE = { r: 0, g: 0, b: 0 };
        const WINDOW_EMPHASIS_LIGHT_GLOW_ALPHA_GAIN = 0.55;
        // "dark" means "let upstream white halo through unchanged".
        let windowEmphasisGlowScheme = "dark";
        const recolorWindowEmphasisTextShadow = (textShadow) => {
            if (typeof textShadow !== "string" || textShadow.length === 0) return textShadow;
            const base = WINDOW_EMPHASIS_LIGHT_GLOW_BASE;
            const gain = WINDOW_EMPHASIS_LIGHT_GLOW_ALPHA_GAIN;
            return textShadow.replace(/rgba?\(([^)]+)\)/gi, (match) => {
                const source = parseRGBAColor(match);
                if (!source) return match;
                const nextAlpha = Math.max(0, Math.min(1, source.a * gain));
                return formatRGBAColor({
                    r: base.r,
                    g: base.g,
                    b: base.b,
                    a: nextAlpha,
                }) ?? match;
            });
        };
        const isWindowEmphasisAnimation = (animation) => {
            if (!(animation instanceof Animation)) return false;
            const id = typeof animation.id === "string" ? animation.id : "";
            return id.includes("emphasize-word-") && !id.includes("float");
        };
        const retintSingleWindowEmphasisAnimation = (animation, scheme) => {
            if (!isWindowEmphasisAnimation(animation)) return;
            const effect = animation.effect;
            if (!effect || typeof effect.getKeyframes !== "function" || typeof effect.setKeyframes !== "function") {
                return;
            }
            const currentMark = animation.__windowEmphasisRetintScheme ?? "dark";
            if (currentMark === scheme) return;
            let originalKeyframes = animation.__windowEmphasisOriginalKeyframes;
            if (!Array.isArray(originalKeyframes)) {
                try {
                    originalKeyframes = effect.getKeyframes();
                } catch (_) {
                    return;
                }
                if (!Array.isArray(originalKeyframes) || originalKeyframes.length === 0) return;
                animation.__windowEmphasisOriginalKeyframes = originalKeyframes;
            }
            const nextKeyframes = scheme === "light"
                ? originalKeyframes.map((frame) => {
                    if (!frame || typeof frame !== "object") return frame;
                    if (typeof frame.textShadow !== "string" || frame.textShadow.length === 0) return frame;
                    return { ...frame, textShadow: recolorWindowEmphasisTextShadow(frame.textShadow) };
                })

            try {
                effect.setKeyframes(nextKeyframes);
                animation.__windowEmphasisRetintScheme = scheme;
            } catch (_) {

            }
        };
        const applyWindowEmphasisGlowScheme = (scheme) => {
            if (!isMainSurface) return;
            if (scheme !== "light" && scheme !== "dark") return;
            if (!Array.isArray(lyricPlayer.currentLyricLineObjects)) return;
            for (const lineObj of lyricPlayer.currentLyricLineObjects) {
                const splitWords = Array.isArray(lineObj?.splittedWords) ? lineObj.splittedWords : [];
                for (const splitWord of splitWords) {
                    const animations = Array.isArray(splitWord?.elementAnimations)
                        ? splitWord.elementAnimations
                        : [];
                    for (const animation of animations) {

                    }
                }
            }
        };
        const syncWindowEmphasisGlowForCurrentScheme = () => {
            if (!isMainSurface) return;
            const scheme = windowEmphasisGlowScheme ?? "dark";
            applyWindowEmphasisGlowScheme(scheme);
        };

        const retintGlowKeyframes = (keyframes, colorValue, alphaMultiplier = 1) => {
            if (!Array.isArray(keyframes)) {

            }
            return keyframes.map((keyframe) => {
                if (!keyframe || typeof keyframe !== "object") return keyframe;
                const nextKeyframe = { ...keyframe };
                if (typeof nextKeyframe.textShadow === "string" && nextKeyframe.textShadow.length > 0) {

                        typeof colorValue === "string" && colorValue.length > 0
                            ? recolorTextShadow(nextKeyframe.textShadow, colorValue)

                        nextKeyframe.textShadow,
                        alphaMultiplier,

                nextKeyframe.webkitTextStrokeColor = "transparent";

                nextKeyframe.backgroundColor = "transparent";
                nextKeyframe.filter = "none";

        const adaptCoverBlurEmphasisKeyframes = (
            keyframes,
            { colorValue = null, alphaMultiplier = 1, suppressGlow = false } = {}
        ) => {
            if (!Array.isArray(keyframes)) {
                return keyframes;
            }
            return keyframes.map((keyframe) => {
                if (!keyframe || typeof keyframe !== "object") return keyframe;
                const nextKeyframe = { ...keyframe };
                if (typeof nextKeyframe.textShadow === "string" && nextKeyframe.textShadow.length > 0) {
                    if (suppressGlow) {
                        nextKeyframe.textShadow = "none";
                    } else {
                        nextKeyframe.textShadow =
                            typeof colorValue === "string" && colorValue.length > 0
                                ? recolorTextShadow(nextKeyframe.textShadow, colorValue)
                                : nextKeyframe.textShadow;
                        nextKeyframe.textShadow = rescaleTextShadowAlpha(
                            nextKeyframe.textShadow,
                            alphaMultiplier,
                        );
                    }
                }
                return nextKeyframe;
            });
        };

        const resolveAnimationComposite = (sourceAnimation, sourceEffect, sourceKeyframes) => {
            const effectComposite = sourceEffect && typeof sourceEffect.composite === "string"
                ? sourceEffect.composite
                : "";
            if (effectComposite.length > 0) return effectComposite;

            const timing = typeof sourceEffect?.getTiming === "function"
                ? sourceEffect.getTiming()
                : null;
            const timingComposite = timing && typeof timing.composite === "string"
                ? timing.composite
                : "";
            if (timingComposite.length > 0) return timingComposite;

            const keyframeComposite = Array.isArray(sourceKeyframes)
                ? sourceKeyframes.find((keyframe) => (
                    keyframe && typeof keyframe.composite === "string" && keyframe.composite.length > 0
                ))?.composite
                : "";
            if (typeof keyframeComposite === "string" && keyframeComposite.length > 0) {
                return keyframeComposite;
            }

            const id = typeof sourceAnimation?.id === "string" ? sourceAnimation.id : "";
            if (id === "float-word" || id.includes("emphasize-word-float")) {
                return "add";
            }

            return "";
        };

        const cloneAnimationToElement = (sourceAnimation, targetElement, options = {}) => {
            if (!(sourceAnimation instanceof Animation)) return null;
            if (!(targetElement instanceof Element) || typeof targetElement.animate !== "function") return null;
            const sourceEffect = sourceAnimation.effect;
            if (
                !sourceEffect
                || typeof sourceEffect.getKeyframes !== "function"
                || typeof sourceEffect.getTiming !== "function"
            ) {
                return null;
            }
            const sourceKeyframes = sourceEffect.getKeyframes();
            if (!Array.isArray(sourceKeyframes) || sourceKeyframes.length === 0) return null;
            const keyframes = typeof options.transformKeyframes === "function"
                ? options.transformKeyframes(sourceKeyframes.map((keyframe) => ({ ...keyframe })))
                : sourceKeyframes;
            if (!Array.isArray(keyframes) || keyframes.length === 0) return null;
            const timing = sourceEffect.getTiming();
            const sourceComposite = resolveAnimationComposite(
                sourceAnimation,
                sourceEffect,
                sourceKeyframes,
            );
            const clonedTiming =
                sourceComposite && sourceComposite !== "replace"
                    ? { ...timing, composite: sourceComposite }
                    : timing;
            let clonedAnimation = null;
            try {
                clonedAnimation = targetElement.animate(keyframes, clonedTiming);
            } catch (_) {
                return null;
            }
            if (!(clonedAnimation instanceof Animation)) return null;
            try {
                if (typeof sourceAnimation.id === "string" && sourceAnimation.id.length > 0) {

                }
            } catch (_) {}
            try {
                clonedAnimation.playbackRate = sourceAnimation.playbackRate;
            } catch (_) {}
            try {
                const sourceCurrentTime = sourceAnimation.currentTime;
                if (typeof sourceCurrentTime === "number" && Number.isFinite(sourceCurrentTime)) {
                    clonedAnimation.currentTime = sourceCurrentTime;
                }
            } catch (_) {}
            try {
                if (sourceAnimation.playState === "running") {
                    clonedAnimation.play();
                } else if (sourceAnimation.playState === "finished") {
                    clonedAnimation.finish();
                } else if (sourceAnimation.playState === "idle") {
                    clonedAnimation.cancel();
                } else {
                    clonedAnimation.pause();
                }
            } catch (_) {
                try {
                    clonedAnimation.pause();
                } catch (_) {}
            }
            return clonedAnimation;
        };

        let fullscreenPackedAnimationTargetMap = new WeakMap();

        const registerFullscreenPackedAnimationTarget = (sourceNode, targetElement) => {
            if (!(sourceNode instanceof Node) || !(targetElement instanceof Element)) return;
            fullscreenPackedAnimationTargetMap.set(sourceNode, targetElement);
        };

        const cancelAnimationSafely = (animation) => {
            if (!(animation instanceof Animation)) return;
            try {
                animation.cancel();
            } catch (_) {}
        };

        const captureFullscreenSourceElementAnimations = (splitWord) => {
            if (!splitWord) return [];
            if (!Array.isArray(splitWord.__fsSourceElementAnimations)) {
                splitWord.__fsSourceElementAnimations = Array.isArray(splitWord?.elementAnimations)
                    ? [...splitWord.elementAnimations]
                    : [];
            }
            return splitWord.__fsSourceElementAnimations.filter((animation) => animation instanceof Animation);
        };

        const isFullscreenEmphasizedWord = (splitWord) => {
            if (splitWord?.shouldEmphasize === true) return true;
            return Array.isArray(splitWord?.subElements) && splitWord.subElements.length > 0;
        };

        const ensureFullscreenEmphasizedCharStacks = (splitWord) => {
            const activeWordElement = splitWord?.__fsActiveWordElement;
            if (!(activeWordElement instanceof HTMLElement)) return [];

            const activeChars = Array.isArray(splitWord?.subElements)
                ? splitWord.subElements.filter((element) => element instanceof HTMLElement)
                : [];
            const charRecords = [];

            for (const activeChar of activeChars) {
                let charStack = activeChar.parentElement;
                if (!(charStack instanceof HTMLElement) || !charStack.classList.contains("amll-fs-char-stack")) {
                    const baseChar = activeChar.cloneNode(true);
                    if (!(baseChar instanceof HTMLElement)) continue;
                    charStack = document.createElement("span");
                    charStack.className = "amll-fs-char-stack";
                    baseChar.classList.add("amll-fs-char-base");
                    baseChar.setAttribute("aria-hidden", "true");
                    activeChar.classList.add("amll-fs-char-active");
                    activeWordElement.insertBefore(charStack, activeChar);
                    charStack.appendChild(baseChar);
                    charStack.appendChild(activeChar);
                }

                const [baseCharElement, activeCharElement] = Array.from(charStack.children);
                if (!(baseCharElement instanceof HTMLElement) || !(activeCharElement instanceof HTMLElement)) {
                    continue;
                }

                baseCharElement.classList.add("amll-fs-char-base");
                baseCharElement.setAttribute("aria-hidden", "true");
                activeCharElement.classList.add("amll-fs-char-active");
                registerFullscreenPackedAnimationTarget(activeCharElement, charStack);
                charRecords.push({
                    stack: charStack,
                    base: baseCharElement,
                    active: activeCharElement,
                });
            }

            splitWord.__fsCharRecords = charRecords;
            return charRecords;
        };

        const formatMaskPx = (value) => {
            if (!Number.isFinite(value)) return "0";
            return `${Math.round(value * 1000) / 1000}`.replace(/\.0+$/, "").replace(/(\.\d*?)0+$/, "$1");
        };

        const shiftMaskPositionValue = (value, deltaX) => {
            if (typeof value !== "string" || value.trim().length === 0 || !Number.isFinite(deltaX)) {
                return value;
            }
            const match = value.match(/(-?\d+(?:\.\d+)?)px/);
            if (!match || typeof match.index !== "number") return value;
            const original = Number.parseFloat(match[1]);
            if (!Number.isFinite(original)) return value;
            const shifted = original - deltaX;
            return `${value.slice(0, match.index)}${formatMaskPx(shifted)}px${value.slice(match.index + match[0].length)}`;
        };

        const resolveAbsoluteMaskSize = (maskSize, referenceWidth) => {
            if (typeof maskSize !== "string" || maskSize.trim().length === 0) return maskSize;
            if (!Number.isFinite(referenceWidth) || referenceWidth <= 0) return maskSize;
            const parts = maskSize.trim().split(/\s+/);
            if (parts.length === 0) return maskSize;
            const percentMatch = parts[0].match(/^(-?\d+(?:\.\d+)?)%$/);
            if (!percentMatch) return maskSize;
            const absoluteWidth = referenceWidth * Number.parseFloat(percentMatch[1]) / 100;
            if (!Number.isFinite(absoluteWidth)) return maskSize;
            return `${formatMaskPx(absoluteWidth)}px${parts.length > 1 ? ` ${parts.slice(1).join(" ")}` : ""}`;
        };

        const cloneMaskAnimationToElement = (sourceAnimation, targetElement, deltaX) => {
            if (!(sourceAnimation instanceof Animation)) return null;
            if (!(targetElement instanceof Element) || typeof targetElement.animate !== "function") return null;
            const sourceEffect = sourceAnimation.effect;
            if (
                !sourceEffect
                || typeof sourceEffect.getKeyframes !== "function"
                || typeof sourceEffect.getTiming !== "function"
            ) {
                return null;
            }
            const sourceKeyframes = sourceEffect.getKeyframes();
            if (!Array.isArray(sourceKeyframes) || sourceKeyframes.length === 0) return null;
            const shiftedKeyframes = sourceKeyframes.map((keyframe) => {
                const next = { ...keyframe };
                if (typeof next.maskPosition === "string") {
                    next.maskPosition = shiftMaskPositionValue(next.maskPosition, deltaX);
                }
                if (typeof next.webkitMaskPosition === "string") {
                    next.webkitMaskPosition = shiftMaskPositionValue(next.webkitMaskPosition, deltaX);
                }
                return next;
            });
            let animation = null;
            try {
                animation = targetElement.animate(shiftedKeyframes, sourceEffect.getTiming());
            } catch (_) {
                return null;
            }
            if (!(animation instanceof Animation)) return null;
            try {
                if (typeof sourceAnimation.id === "string" && sourceAnimation.id.length > 0) {
                    animation.id = sourceAnimation.id;
                }
            } catch (_) {}
            try {
                animation.playbackRate = sourceAnimation.playbackRate;
            } catch (_) {}
            try {
                const sourceCurrentTime = sourceAnimation.currentTime;
                if (typeof sourceCurrentTime === "number" && Number.isFinite(sourceCurrentTime)) {
                    animation.currentTime = sourceCurrentTime;
                }
            } catch (_) {}
            try {
                if (sourceAnimation.playState === "running") {
                    animation.play();
                } else if (sourceAnimation.playState === "finished") {
                    animation.finish();
                } else if (sourceAnimation.playState === "idle") {
                    animation.cancel();
                } else {
                    animation.pause();
                }
            } catch (_) {
                try {
                    animation.pause();
                } catch (_) {}
            }
            return animation;
        };

        const getAnimationEffectTarget = (animation) => {
            if (!(animation instanceof Animation)) return null;
            const target = animation?.effect?.target;
            return target instanceof Element ? target : null;
        };

        const maskAnimationsTargetElements = (animations, elements) => {
            if (!Array.isArray(animations) || animations.length === 0) return false;
            const expectedTargets = new Set(
                (Array.isArray(elements) ? elements : []).filter((element) => element instanceof Element)
            );
            if (expectedTargets.size === 0) return false;
            return animations.every((animation) => {
                const target = getAnimationEffectTarget(animation);
                return target instanceof Element && expectedTargets.has(target);
            });
        };

        const shouldRefreshFullscreenEmphasizedMaskAnimations = (splitWord) => {
            const activeWordElement = splitWord?.__fsActiveWordElement;
            if (!(activeWordElement instanceof HTMLElement)) return false;
            const charTargets = Array.isArray(splitWord?.__fsCharRecords)
                ? splitWord.__fsCharRecords
                    .map((record) => record?.active)
                    .filter((element) => element instanceof HTMLElement)
                : [];
            if (maskAnimationsTargetElements(splitWord?.maskAnimations, charTargets)) {
                return false;
            }
            if (!Array.isArray(splitWord?.maskAnimations)) {
                return true;
            }
            return splitWord.maskAnimations.some(
                (animation) => getAnimationEffectTarget(animation) === activeWordElement
            );
        };

        const shouldRefreshCoverBlurEmphasizedMaskAnimations = (splitWord) => {
            const activeWordElement = splitWord?.__cbActiveWordElement;
            if (!(activeWordElement instanceof HTMLElement)) return false;
            const charTargets = Array.isArray(splitWord?.__cbCharRecords)
                ? splitWord.__cbCharRecords
                    .map((record) => record?.active)
                    .filter((element) => element instanceof HTMLElement)
                : [];
            if (maskAnimationsTargetElements(splitWord?.maskAnimations, charTargets)) {
                return false;
            }
            if (!Array.isArray(splitWord?.maskAnimations)) {
                return true;
            }
            return splitWord.maskAnimations.some(
                (animation) => getAnimationEffectTarget(animation) === activeWordElement
            );
        };

        const installFullscreenEmphasizedMaskAnimations = (splitWord) => {
            const activeWordElement = splitWord?.__fsActiveWordElement;
            const charRecords = Array.isArray(splitWord?.__fsCharRecords) ? splitWord.__fsCharRecords : [];
            if (!(activeWordElement instanceof HTMLElement) || charRecords.length === 0) return;

            const sourceMaskAnimations = Array.isArray(splitWord?.maskAnimations)
                ? splitWord.maskAnimations.filter(
                    (animation) => animation instanceof Animation && animation?.effect?.target === activeWordElement
                )
                : [];
            if (sourceMaskAnimations.length === 0) return;

            const rootRect = activeWordElement.getBoundingClientRect();
            const rootWidth = Math.max(
                1,
                activeWordElement.clientWidth,
                rootRect.width,
                Number.isFinite(splitWord?.width) ? splitWord.width : 0
            );
            const resolvedMaskSize = resolveAbsoluteMaskSize(
                activeWordElement.style.maskSize,
                rootWidth
            );
            const resolvedWebkitMaskSize = resolveAbsoluteMaskSize(
                activeWordElement.style.webkitMaskSize,
                rootWidth
            );
            const nextMaskAnimations = [];

            for (const record of charRecords) {
                const activeChar = record?.active;
                if (!(activeChar instanceof HTMLElement)) continue;

                if (activeWordElement.style.maskImage) {
                    activeChar.style.maskImage = activeWordElement.style.maskImage;
                }
                if (activeWordElement.style.webkitMaskImage) {
                    activeChar.style.webkitMaskImage = activeWordElement.style.webkitMaskImage;
                }
                if (activeWordElement.style.maskRepeat) {
                    activeChar.style.maskRepeat = activeWordElement.style.maskRepeat;
                }
                if (activeWordElement.style.webkitMaskRepeat) {
                    activeChar.style.webkitMaskRepeat = activeWordElement.style.webkitMaskRepeat;
                }
                if (activeWordElement.style.maskOrigin) {
                    activeChar.style.maskOrigin = activeWordElement.style.maskOrigin;
                }
                if (activeWordElement.style.webkitMaskOrigin) {
                    activeChar.style.webkitMaskOrigin = activeWordElement.style.webkitMaskOrigin;
                }
                if (resolvedMaskSize) {
                    activeChar.style.maskSize = resolvedMaskSize;
                }
                if (resolvedWebkitMaskSize) {
                    activeChar.style.webkitMaskSize = resolvedWebkitMaskSize;
                }

                const activeRect = activeChar.getBoundingClientRect();
                const deltaX = activeRect.left - rootRect.left;
                for (const sourceMaskAnimation of sourceMaskAnimations) {
                    const clone = cloneMaskAnimationToElement(sourceMaskAnimation, activeChar, deltaX);
                    if (clone instanceof Animation) {
                        nextMaskAnimations.push(clone);
                    }
                }
            }

            for (const animation of sourceMaskAnimations) {

            }

            activeWordElement.style.maskImage = "none";
            activeWordElement.style.webkitMaskImage = "none";
            activeWordElement.style.maskPosition = "0 0";
            activeWordElement.style.webkitMaskPosition = "0 0";
            activeWordElement.style.maskSize = "auto";
            activeWordElement.style.webkitMaskSize = "auto";

            splitWord.maskAnimations = nextMaskAnimations;
            splitWord.__fsInstalledMaskAnimations = nextMaskAnimations;

        const teardownFullscreenGlowLayer = (splitWord) => {
            if (!splitWord) return;
            const previousGlowAnimations = Array.isArray(splitWord?.__fsGlowAnimations)

                : [];
            for (const animation of previousGlowAnimations) {
                cancelAnimationSafely(animation);
            }
            splitWord.__fsGlowAnimations = [];

            const glowLayer = splitWord?.__fsGlowLayer;
            if (glowLayer instanceof HTMLElement) {

            }
            splitWord.__fsGlowLayer = null;

            const activeWordElement = splitWord?.__fsActiveWordElement;
            if (activeWordElement instanceof HTMLElement) {
                activeWordElement.style.removeProperty("text-shadow");
            }
        };

        /**
         * Mark generic cover-blur emphasized words so the highlight-only surface can
         * show the normal active body. The actual upstream emphasis animation chain
         * stays on per-character packed targets; cover-blur only adapts its textShadow
         * in installFullscreenPackedElementAnimations().
         */
        const installFullscreenEmphasizedGlowLayer = (splitWord) => {
            const isCoverBlurGenericGlow = isFullscreenCoverBlurGenericMode();
            if (!isCoverBlurGenericGlow) return;
            if (!splitWord) return;
            const activeWordElement = splitWord?.__fsActiveWordElement;
            const stackElement = splitWord?.__fsWordStackElement;
            if (!(activeWordElement instanceof HTMLElement)) return;
            if (!(stackElement instanceof HTMLElement)) return;

            // Find emphasize-word animations (these contain text-shadow)
            const sourceAnimations = captureFullscreenSourceElementAnimations(splitWord);
            const emphasisAnimations = sourceAnimations.filter((animation) => {
                if (!(animation instanceof Animation)) return false;
                const id = typeof animation.id === "string" ? animation.id : "";
                return id.includes("emphasize-word-") && !id.includes("float");
            });

            if (emphasisAnimations.length === 0) return;

            // === Cover-blur highlight-only: main emphasis body channel ===
            // The highlight-only WebView hides .amll-fs-word-active / .amll-fs-char-active by
            // default so non-emphasized text stays invisible. Tagging the word-stack here
            // re-enables a controlled, opaque body fill for the emphasized word via the
            // companion CSS rule (data-amll-fs-emphasis-body). The body channel is
            // independent of the decorative glow profile alpha — emphasis stays readable
            // even when the glow is intentionally subtle (lighter) or color-clipped
            // against the blurred cover (darker). The glow clone below stays purely
            // decorative.
            stackElement.setAttribute("data-amll-fs-emphasis-body", "1");

            // Older cover-blur revisions installed a single word-level glow clone.
            // That collapsed AMLL's per-character emphasize-word-* animations onto one
            // target and broke the official timing/transform semantics. Remove any
            // stale layer and let the packed per-character clone carry the animation.
            teardownFullscreenGlowLayer(splitWord);

            if (fullscreenCoverBlurSuppressEmphasisGlow === true) {
                activeWordElement.style.setProperty("text-shadow", "none", "important");
            } else {
                activeWordElement.style.removeProperty("text-shadow");
            }
        };

        const refreshFullscreenCoverBlurGenericGlowLayers = () => {
            if (!isFullscreenCoverBlurGenericMode()) return;
            if (!Array.isArray(lyricPlayer.currentLyricLineObjects)) return;

            for (const lineObj of lyricPlayer.currentLyricLineObjects) {
                const splitWords = Array.isArray(lineObj?.splittedWords) ? lineObj.splittedWords : [];
                for (const splitWord of splitWords) {
                    if (!isFullscreenEmphasizedWord(splitWord)) continue;
                    if (!(splitWord?.__fsWordStackElement instanceof HTMLElement)) continue;
                    installFullscreenEmphasizedGlowLayer(splitWord);
                }
            }
        };

        const createFullscreenPackedWordAnimation = (stackElement, splitWord, lineObj, sourceAnimations) => {
            if (!(stackElement instanceof HTMLElement) || typeof stackElement.animate !== "function") return null;
            const existingAnimations = Array.isArray(sourceAnimations)
                ? sourceAnimations
                : captureFullscreenSourceElementAnimations(splitWord);
            const sourceFloatAnimation = existingAnimations.find((animation) => {
                if (!(animation instanceof Animation)) return false;
                const id = typeof animation.id === "string" ? animation.id : "";
                return id === "float-word" || id.includes("emphasize-word-float-only");
            });
            if (sourceFloatAnimation) {
                const cloned = cloneAnimationToElement(sourceFloatAnimation, stackElement);
                if (cloned) {
                    return {
                        animation: cloned,
                        sourceFloatAnimation,
                    };
                }
            }

            const line = lineObj?.getLine?.() ?? lineObj?.lyricLine;
            const lineStart = Number.isFinite(line?.startTime) ? line.startTime : 0;
            const wordStart = Number.isFinite(splitWord?.startTime) ? splitWord.startTime : lineStart;
            const wordEndRaw = Number.isFinite(splitWord?.endTime) ? splitWord.endTime : (wordStart + 1);
            const wordEnd = Math.max(wordStart + 1, wordEndRaw);
            const duration = Math.max(220, wordEnd - wordStart);
            const delay = Math.max(0, wordStart - lineStart);

            let animation = null;
            try {
                animation = stackElement.animate(
                    [
                        { transform: "translateY(0em) scale(1)" },
                        { transform: "translateY(-0.05em) scale(1.03)" }
                    ],
                    {
                        duration,
                        delay,
                        id: "float-word",
                        composite: "add",
                        fill: "both",
                        easing: "ease-out",
                        iterations: 1
                    }
                );
            } catch (_) {
                return null;
            }
            if (!(animation instanceof Animation)) return null;
            animation.pause();
            try {
                const currentAbsTime = typeof lyricPlayer.getCurrentTime === "function"
                    ? lyricPlayer.getCurrentTime()
                    : lineStart;
                const lineRelativeTime = Math.max(0, currentAbsTime - lineStart);
                animation.currentTime = Math.max(0, Math.min(delay + duration, lineRelativeTime));
            } catch (_) {}
            return {
                animation,
                sourceFloatAnimation: null,
            };
        };

        const installFullscreenPackedElementAnimations = (splitWord, lineObj) => {
            if (!splitWord) return;
            if (splitWord.__fsElementAnimationsInstalled === true) return;

            const stackElement = splitWord?.__fsWordStackElement;
            if (!(stackElement instanceof HTMLElement)) return;
            const sourceAnimations = captureFullscreenSourceElementAnimations(splitWord);

            const previousAnimations = Array.isArray(splitWord?.__fsInstalledElementAnimations)
                ? splitWord.__fsInstalledElementAnimations
                : [];
            for (const animation of previousAnimations) {
                cancelAnimationSafely(animation);
            }
            
            const previousPackedAnimation = splitWord?.__fsPackedAnimation;
            if (previousPackedAnimation instanceof Animation) {
                cancelAnimationSafely(previousPackedAnimation);
            }

            const packedResult = createFullscreenPackedWordAnimation(stackElement, splitWord, lineObj, sourceAnimations);
            const packedAnimation = packedResult?.animation ?? null;
            const sourceFloatAnimation = packedResult?.sourceFloatAnimation ?? null;
            const clonedAnimations = packedAnimation instanceof Animation ? [packedAnimation] : [];

            for (const sourceAnimation of sourceAnimations) {
                if (!(sourceAnimation instanceof Animation) || sourceAnimation === sourceFloatAnimation) continue;
                const sourceTarget = sourceAnimation?.effect?.target;
                if (!(sourceTarget instanceof Node)) continue;
                const packedTarget = fullscreenPackedAnimationTargetMap.get(sourceTarget);
                if (!(packedTarget instanceof Element)) continue;
                let clone = null;
                if (isFullscreenCoverBlurGenericMode() && isEmphasisTextShadowAnimation(sourceAnimation)) {
                    const profile = getFullscreenCoverBlurGenericProfile();
                    const glowThemeColor = resolveFullscreenCoverBlurGlowColor(profile);
                    const glowAlphaMultiplier = resolveFullscreenCoverBlurGlowAlphaMultiplier(profile);
                    clone = cloneAnimationToElement(sourceAnimation, packedTarget, {
                        transformKeyframes: (keyframes) => adaptCoverBlurEmphasisKeyframes(
                            keyframes,
                            {
                                colorValue: glowThemeColor,
                                alphaMultiplier: glowAlphaMultiplier,
