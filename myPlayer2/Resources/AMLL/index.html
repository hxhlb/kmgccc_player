<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMLL Lyrics</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }
        #player {
            width: 100%;
            height: 100%;
            background: transparent;
        }

        .amll-lyric-player {
            font-family: var(--amll-lp-main-font-family, -apple-system, "Helvetica Neue", sans-serif);
            font-weight: var(--amll-lp-main-font-weight, 600);
            mix-blend-mode: var(--amll-lp-mix-blend-mode, plus-lighter) !important;
            opacity: var(--amll-lp-mix-opacity, 1);
        }
        .amll-lyric-player.dom,
        .amll-lyric-player.dom-slim {
            line-height: 1.44em;
        }
        ._lyricLine_m23bz_6,
        ._lyricLine_1jop6_6 {
            overflow: visible;
        }
        ._lyricMainLine_m23bz_99,
        ._lyricMainLine_1jop6_80 {
            font-family: var(--amll-lp-main-font-family, -apple-system, "Helvetica Neue", sans-serif);
            font-weight: var(--amll-lp-main-font-weight, 600);
            line-height: 1.42em;
            padding-bottom: 1.05em;
        }
        ._lyricSubLine_m23bz_145,
        ._lyricSubLine_1jop6_90 {
            font-family: var(--amll-lp-translation-font-family, -apple-system, "Helvetica Neue", sans-serif);
            font-weight: var(--amll-lp-translation-font-weight, 400);
            font-size: var(--amll-lp-translation-font-size, 0.75em);
            line-height: 1.42em;
        }

        /* Background (small) lyric lines:
           hidden by default, fade in only when active, fade out after active ends. */
        .amll-lyric-player [class*="_lyricBgLine_"] {
            opacity: 0 !important;
            padding-top: 0.2em !important;
            padding-bottom: 0.2em !important;
            scale: 1 !important;
            transition: opacity .32s ease !important;
        }
        .amll-lyric-player [class*="_lyricBgLine_"][class*="_active_"] {
            opacity: 0.4 !important;
            scale: 1 !important;
        }

        /* Animate text inside bg-line so we don't override AMLL line positioning transform. */
        .amll-lyric-player [class*="_lyricBgLine_"] > * {
            transform: translateY(10px);
            transition: transform .42s ease, opacity .32s ease;
        }
        .amll-lyric-player [class*="_lyricBgLine_"][class*="_active_"] > * {
            transform: translateY(0);
        }

        /* Fullscreen surface: no additive compositing, no semi-transparent lyric states. */
        .amll-lyric-player.amll-surface-fullscreen,
        .amll-lyric-player.amll-surface-fullscreen * {
            mix-blend-mode: normal !important;
            background-blend-mode: normal !important;
        }
        .amll-lyric-player.amll-surface-fullscreen {
            opacity: 1 !important;
            text-shadow: none !important;
            --amll-lp-mix-opacity: 1;
            --amll-lp-mix-blend-mode: normal;
        }
        .amll-lyric-player.amll-surface-fullscreen [class*="_lyricLine_"] {
            color: var(--amll-fs-main-inactive, var(--amll-inactive, var(--amll-lp-color, white))) !important;
        }
        .amll-lyric-player.amll-surface-fullscreen [class*="_lyricLine_"][class*="_active_"] {
            color: var(--amll-fs-main-active, var(--amll-active, var(--amll-lp-color, white))) !important;
        }
        .amll-lyric-player.amll-surface-fullscreen.fs-line-timing-only [class*="_lyricLine_"]:not([class*="_active_"]) {
            color: var(
                --amll-fs-main-line-timing-inactive,
                var(--amll-fs-main-inactive, var(--amll-inactive, var(--amll-lp-color, white)))
            ) !important;
        }
        .amll-lyric-player.amll-surface-fullscreen [class*="_lyricLine_"] > *,
        .amll-lyric-player.amll-surface-fullscreen [class*="_lyricMainLine_"],
        .amll-lyric-player.amll-surface-fullscreen [class*="_lyricMainLine_"] *,
        .amll-lyric-player.amll-surface-fullscreen [class*="_emphasizeWrapper_"],
        .amll-lyric-player.amll-surface-fullscreen [class*="_emphasizeWrapper_"] *,
        .amll-lyric-player.amll-surface-fullscreen [class*="_emphasize_"],
        .amll-lyric-player.amll-surface-fullscreen [class*="_emphasize_"] *,
        .amll-lyric-player.amll-surface-fullscreen [class*="_romanWord_"],
        .amll-lyric-player.amll-surface-fullscreen [class*="_lyricSubLine_"],
        .amll-lyric-player.amll-surface-fullscreen [class*="_lyricSubLine_"] *,
        .amll-lyric-player.amll-surface-fullscreen [class*="_lyricBgLine_"],
        .amll-lyric-player.amll-surface-fullscreen [class*="_lyricBgLine_"] > * {
            opacity: 1 !important;
        }
        .amll-lyric-player.amll-surface-fullscreen [class*="_lyricLine_"] > [class*="_lyricSubLine_"],
        .amll-lyric-player.amll-surface-fullscreen [class*="_lyricLine_"] > [class*="_lyricSubLine_"] * {
            color: var(
                --amll-fs-sub-inactive,
                var(--amll-fs-main-inactive, var(--amll-inactive, var(--amll-lp-color, white)))
            ) !important;
        }
        .amll-lyric-player.amll-surface-fullscreen .amll-fs-word-stack {
            display: inline-grid !important;
            position: relative !important;
            vertical-align: baseline !important;
            transform-origin: 50% 82% !important;
            will-change: transform !important;
        }
        .amll-lyric-player.amll-surface-fullscreen .amll-fs-word-stack > * {
            grid-area: 1 / 1 !important;
        }
        .amll-lyric-player.amll-surface-fullscreen .amll-fs-char-stack {
            display: inline-grid !important;
            position: relative !important;
            vertical-align: baseline !important;
            transform-origin: 50% 82% !important;
            will-change: transform !important;
        }
        .amll-lyric-player.amll-surface-fullscreen .amll-fs-char-stack > * {
            grid-area: 1 / 1 !important;
        }
        .amll-lyric-player.amll-surface-fullscreen .amll-fs-word-base {
            color: var(
                --amll-fs-main-inactive,
                var(--amll-inactive, var(--amll-lp-color, white))
            ) !important;
            opacity: 1 !important;
            mix-blend-mode: normal !important;
            mask: none !important;
            -webkit-mask: none !important;
            mask-image: none !important;
            -webkit-mask-image: none !important;
            pointer-events: none !important;
            user-select: none !important;
        }
        .amll-lyric-player.amll-surface-fullscreen .amll-fs-char-base {
            color: var(
                --amll-fs-main-inactive,
                var(--amll-inactive, var(--amll-lp-color, white))
            ) !important;
            opacity: 1 !important;
            mix-blend-mode: normal !important;
            mask: none !important;
            -webkit-mask: none !important;
            mask-image: none !important;
            -webkit-mask-image: none !important;
            pointer-events: none !important;
            user-select: none !important;
        }
        .amll-lyric-player.amll-surface-fullscreen.fs-line-timing-only [class*="_lyricLine_"]:not([class*="_active_"]) .amll-fs-word-base {
            color: var(
                --amll-fs-main-line-timing-inactive,
                var(--amll-fs-main-inactive, var(--amll-inactive, var(--amll-lp-color, white)))
            ) !important;
        }
        .amll-lyric-player.amll-surface-fullscreen.fs-line-timing-only [class*="_lyricLine_"]:not([class*="_active_"]) .amll-fs-char-base {
            color: var(
                --amll-fs-main-line-timing-inactive,
                var(--amll-fs-main-inactive, var(--amll-inactive, var(--amll-lp-color, white)))
            ) !important;
        }
        .amll-lyric-player.amll-surface-fullscreen .amll-fs-word-active {
            color: var(
                --amll-fs-main-active,
                var(--amll-active, var(--amll-lp-color, white))
            ) !important;
            mix-blend-mode: normal !important;
            opacity: 1 !important;
            transition: opacity .16s ease-out, color .14s ease-out !important;
            /* Keep per-word sweep animation, but make non-highlighted area fully transparent
               so the opaque base layer stays identical to inactive line color. */
            --bright-mask-alpha: 1 !important;
            --dark-mask-alpha: 0 !important;
        }
        .amll-lyric-player.amll-surface-fullscreen .amll-fs-char-active {
            color: var(
                --amll-fs-main-active,
                var(--amll-active, var(--amll-lp-color, white))
            ) !important;
            mix-blend-mode: normal !important;
            opacity: 1 !important;
            transition: opacity .16s ease-out, color .14s ease-out !important;
            --bright-mask-alpha: 1 !important;
            --dark-mask-alpha: 0 !important;
        }
        .amll-lyric-player.amll-surface-fullscreen [class*="_lyricLine_"]:not([class*="_active_"]) .amll-fs-word-active {
            color: var(
                --amll-fs-main-inactive,
                var(--amll-inactive, var(--amll-lp-color, white))
            ) !important;
            opacity: 0 !important;
        }
        .amll-lyric-player.amll-surface-fullscreen [class*="_lyricLine_"]:not([class*="_active_"]) .amll-fs-char-active {
            color: var(
                --amll-fs-main-inactive,
                var(--amll-inactive, var(--amll-lp-color, white))
            ) !important;
            opacity: 0 !important;
        }
        .amll-lyric-player.amll-surface-fullscreen [class*="_lyricLine_"][class*="_active_"] > [class*="_lyricSubLine_"],
        .amll-lyric-player.amll-surface-fullscreen [class*="_lyricLine_"][class*="_active_"] > [class*="_lyricSubLine_"] * {
            color: var(
                --amll-fs-sub-active,
                var(--amll-fs-main-active, var(--amll-active, var(--amll-lp-color, white)))
            ) !important;
        }
        .amll-lyric-player.amll-surface-fullscreen.fs-line-timing-only [class*="_lyricLine_"]:not([class*="_active_"]) > [class*="_lyricSubLine_"],
        .amll-lyric-player.amll-surface-fullscreen.fs-line-timing-only [class*="_lyricLine_"]:not([class*="_active_"]) > [class*="_lyricSubLine_"] * {
            color: var(
                --amll-fs-sub-line-timing-inactive,
                var(--amll-fs-sub-inactive, var(--amll-fs-main-line-timing-inactive, var(--amll-lp-color, white)))
            ) !important;
        }
        .amll-lyric-player.amll-surface-fullscreen [class*="_lyricBgLine_"] {
            visibility: hidden !important;
            color: var(
                --amll-fs-main-line-timing-inactive,
                var(--amll-fs-main-inactive, var(--amll-inactive, var(--amll-lp-color, white)))
            ) !important;
            transition: color .18s ease, visibility 0s linear .18s !important;
            will-change: transform !important;
        }
        .amll-lyric-player.amll-surface-fullscreen [class*="_lyricBgLine_"][class*="_active_"] {
            visibility: visible !important;
            color: var(
                --amll-fs-bg-active,
                var(--amll-fs-main-line-timing-inactive, var(--amll-fs-main-inactive, var(--amll-lp-color, white)))
            ) !important;
            transition-delay: 0s !important;
        }
        .amll-lyric-player.amll-surface-fullscreen [class*="_lyricBgLine_"] > *,
        .amll-lyric-player.amll-surface-fullscreen [class*="_lyricBgLine_"][class*="_active_"] > * {
            transform: none !important;
            transition: none !important;
        }

    </style>
</head>
<body>
    <div id="player"></div>

    <!-- Load Bridge first so logs & AMLL namespace are available -->
    <script src="bridge.js"></script>

    <script type="module">
        import { LyricPlayer, parseTTML } from "./amll-core.js";

        console.log("[LyricsRenderer] Module script loaded");

        const surfaceRole = typeof window.__AMLL_SURFACE_ROLE === "string"
            ? window.__AMLL_SURFACE_ROLE
            : "main";
        const isFullscreenSurface = surfaceRole === "fullscreen";
        // Fullscreen-specific compositing fallback is disabled.
        // Fullscreen AMLL now follows the same renderer path as main window.
        const fullscreenForcedByHost = false;
        console.log(
            `[LyricsRenderer] Boot: role=${surfaceRole}, href=${window.location.href}, fullscreenFallback=${fullscreenForcedByHost}`
        );

        // Initialize Player
        const playerContainer = document.getElementById('player');
        const lyricPlayer = new LyricPlayer();
        playerContainer.appendChild(lyricPlayer.getElement());
        if (isFullscreenSurface) {
            lyricPlayer.getElement().classList.add("amll-surface-fullscreen");
        }
        
        // Initial config defaults
        lyricPlayer.setEnableSpring(true);
        lyricPlayer.setEnableBlur(true);
        const defaultWordFadeWidth = 0.7;
        lyricPlayer.setWordFadeWidth(defaultWordFadeWidth);
        let renderScale = 0.75;
        let fullscreenOpaqueLyricsMode = isFullscreenSurface || fullscreenForcedByHost;
        if (typeof lyricPlayer.setRenderScale === "function") {
            lyricPlayer.setRenderScale(renderScale);
        }
        // Remove core's default 30fps ticker cap if API is available.
        if (typeof lyricPlayer.setFPS === "function") {
            lyricPlayer.setFPS(0);
        }
        let externalTimeMs = 0;
        let externalTimeAnchorPerfMs = performance.now();
        let externalIsPlaying = true;
        // Align active line toward top (instead of center)
        lyricPlayer.setAlignAnchor("top");
        lyricPlayer.setAlignPosition(0.2);
        
        // Helper to map TTML lines to AMLL LyricLine format
        const mapTTMLLyric = (line) => ({
            ...line,
            words: line.words.map((word) => ({ obscene: false, romanWord: "", ...word })),
            romanLyric: "",
        });

        let lastSeekAt = 0;
        let lastSeekSeconds = null;
        const emitSeek = (line) => {
            if (!line) return;
            const start = typeof line.startTime === "number" ? line.startTime : undefined;
            if (start === undefined || Number.isNaN(start)) return;

            const currentMs = typeof lyricPlayer.getCurrentTime === "function"
                ? lyricPlayer.getCurrentTime()
                : 0;
            const looksLikeMs = start > 1000 || (currentMs > 0 && Math.abs(start - currentMs) < 5000);
            const seconds = looksLikeMs ? start / 1000 : start;

            const now = performance.now();
            if (lastSeekSeconds !== null && Math.abs(seconds - lastSeekSeconds) < 0.01 && now - lastSeekAt < 250) {
                return;
            }
            lastSeekAt = now;
            lastSeekSeconds = seconds;

            if (window.AMLL && typeof window.AMLL._onUserSeek === "function") {
                window.AMLL._onUserSeek(seconds);
            } else if (window.webkit?.messageHandlers?.onUserSeek) {
                window.webkit.messageHandlers.onUserSeek.postMessage({ seconds });
            }
        };

        const resolveLineFromTarget = (target) => {
            let node = target;
            const root = lyricPlayer.getElement();
            while (node && node !== root) {
                const lineObj = lyricPlayer.lyricLineElementMap?.get?.(node);
                if (lineObj?.getLine) return lineObj.getLine();
                node = node.parentElement;
            }
            return null;
        };

        const syncWordFadeWidth = () => {
            if (typeof lyricPlayer.setWordFadeWidth !== "function") return;
            lyricPlayer.setWordFadeWidth(defaultWordFadeWidth);
        };

        const toOpaqueColor = (value) => {
            if (typeof value !== "string") return value;
            const raw = value.trim();
            if (raw.length === 0) return value;

            const rgbaMatch = raw.match(
                /^rgba?\(\s*([^,]+)\s*,\s*([^,]+)\s*,\s*([^,)\s]+)(?:\s*,\s*[^)]+)?\s*\)$/i
            );
            if (rgbaMatch) {
                const red = rgbaMatch[1].trim();
                const green = rgbaMatch[2].trim();
                const blue = rgbaMatch[3].trim();
                return `rgb(${red}, ${green}, ${blue})`;
            }

            const hslaMatch = raw.match(
                /^hsla?\(\s*([^,]+)\s*,\s*([^,]+)\s*,\s*([^,)\s]+)(?:\s*,\s*[^)]+)?\s*\)$/i
            );
            if (hslaMatch) {
                const hue = hslaMatch[1].trim();
                const saturation = hslaMatch[2].trim();
                const lightness = hslaMatch[3].trim();
                return `hsl(${hue}, ${saturation}, ${lightness})`;
            }

            if (/^#[0-9a-f]{8}$/i.test(raw)) {
                return `#${raw.slice(1, 7)}`;
            }
            if (/^#[0-9a-f]{4}$/i.test(raw)) {
                return `#${raw.slice(1, 4)}`;
            }
            const css4RgbMatch = raw.match(/^rgb(a)?\((.+)\)$/i);
            if (css4RgbMatch) {
                const body = css4RgbMatch[2];
                if (body.includes("/")) {
                    return `rgb(${body.split("/")[0].trim()})`;
                }
            }
            const css4HslMatch = raw.match(/^hsl(a)?\((.+)\)$/i);
            if (css4HslMatch) {
                const body = css4HslMatch[2];
                if (body.includes("/")) {
                    return `hsl(${body.split("/")[0].trim()})`;
                }
            }
            const cssColorFnMatch = raw.match(/^color\((.+)\)$/i);
            if (cssColorFnMatch && cssColorFnMatch[1].includes("/")) {
                return `color(${cssColorFnMatch[1].split("/")[0].trim()})`;
            }
            return raw;
        };

        const enforceFullscreenOpaqueColorVars = () => {
            if (!fullscreenOpaqueLyricsMode) return;
            const playerElement = lyricPlayer.getElement();
            const vars = [
                "--amll-fs-main-active",
                "--amll-fs-main-inactive",
                "--amll-fs-sub-active",
                "--amll-fs-sub-inactive",
                "--amll-fs-main-line-timing-inactive",
                "--amll-fs-sub-line-timing-inactive",
                "--amll-fs-bg-active",
                "--amll-lp-color",
            ];
            for (const name of vars) {
                const value = playerElement.style.getPropertyValue(name);
                if (!value || value.trim().length === 0) continue;
                playerElement.style.setProperty(name, toOpaqueColor(value));
            }
        };

        const startFullscreenCompositingGuard = () => {};

        const stopFullscreenCompositingGuard = () => {
            const playerElement = lyricPlayer.getElement();
            if (!playerElement || fullscreenOpaqueLyricsMode) return;
            playerElement.classList.remove("amll-surface-fullscreen");
        };

        const enforceFullscreenNormalCompositing = () => {
            if (!fullscreenOpaqueLyricsMode) return;
            const playerElement = lyricPlayer.getElement();
            playerElement.classList.add("amll-surface-fullscreen");
            document.documentElement.style.setProperty("--amll-lp-mix-blend-mode", "normal");
            document.documentElement.style.setProperty("--amll-lp-mix-opacity", "1");
            playerElement.style.setProperty("mix-blend-mode", "normal", "important");
            playerElement.style.setProperty("opacity", "1", "important");
            playerElement.style.textShadow = "none";
            enforceFullscreenOpaqueColorVars();
        };

        const cloneAnimationToElement = (sourceAnimation, targetElement) => {
            if (!(sourceAnimation instanceof Animation)) return null;
            if (!(targetElement instanceof Element) || typeof targetElement.animate !== "function") return null;
            const sourceEffect = sourceAnimation.effect;
            if (
                !sourceEffect
                || typeof sourceEffect.getKeyframes !== "function"
                || typeof sourceEffect.getTiming !== "function"
            ) {
                return null;
            }
            const keyframes = sourceEffect.getKeyframes();
            if (!Array.isArray(keyframes) || keyframes.length === 0) return null;
            const timing = sourceEffect.getTiming();
            let clonedAnimation = null;
            try {
                clonedAnimation = targetElement.animate(keyframes, timing);
            } catch (_) {
                return null;
            }
            if (!(clonedAnimation instanceof Animation)) return null;
            try {
                if (typeof sourceAnimation.id === "string" && sourceAnimation.id.length > 0) {
                    clonedAnimation.id = sourceAnimation.id;
                }
            } catch (_) {}
            try {
                clonedAnimation.playbackRate = sourceAnimation.playbackRate;
            } catch (_) {}
            try {
                const sourceCurrentTime = sourceAnimation.currentTime;
                if (typeof sourceCurrentTime === "number" && Number.isFinite(sourceCurrentTime)) {
                    clonedAnimation.currentTime = sourceCurrentTime;
                }
            } catch (_) {}
            try {
                if (sourceAnimation.playState === "running") {
                    clonedAnimation.play();
                } else if (sourceAnimation.playState === "finished") {
                    clonedAnimation.finish();
                } else if (sourceAnimation.playState === "idle") {
                    clonedAnimation.cancel();
                } else {
                    clonedAnimation.pause();
                }
            } catch (_) {
                try {
                    clonedAnimation.pause();
                } catch (_) {}
            }
            return clonedAnimation;
        };

        const fullscreenPackedAnimationTargetMap = new WeakMap();

        const registerFullscreenPackedAnimationTarget = (sourceNode, targetElement) => {
            if (!(sourceNode instanceof Node) || !(targetElement instanceof Element)) return;
            fullscreenPackedAnimationTargetMap.set(sourceNode, targetElement);
        };

        const cancelAnimationSafely = (animation) => {
            if (!(animation instanceof Animation)) return;
            try {
                animation.cancel();
            } catch (_) {}
        };

        const captureFullscreenSourceElementAnimations = (splitWord) => {
            if (!splitWord) return [];
            if (!Array.isArray(splitWord.__fsSourceElementAnimations)) {
                splitWord.__fsSourceElementAnimations = Array.isArray(splitWord?.elementAnimations)
                    ? [...splitWord.elementAnimations]
                    : [];
            }
            return splitWord.__fsSourceElementAnimations.filter((animation) => animation instanceof Animation);
        };

        const isFullscreenEmphasizedWord = (splitWord) => {
            if (splitWord?.shouldEmphasize === true) return true;
            return Array.isArray(splitWord?.subElements) && splitWord.subElements.length > 0;
        };

        const ensureFullscreenEmphasizedCharStacks = (splitWord) => {
            const activeWordElement = splitWord?.__fsActiveWordElement;
            if (!(activeWordElement instanceof HTMLElement)) return [];

            const activeChars = Array.isArray(splitWord?.subElements)
                ? splitWord.subElements.filter((element) => element instanceof HTMLElement)
                : [];
            const charRecords = [];

            for (const activeChar of activeChars) {
                let charStack = activeChar.parentElement;
                if (!(charStack instanceof HTMLElement) || !charStack.classList.contains("amll-fs-char-stack")) {
                    const baseChar = activeChar.cloneNode(true);
                    if (!(baseChar instanceof HTMLElement)) continue;
                    charStack = document.createElement("span");
                    charStack.className = "amll-fs-char-stack";
                    baseChar.classList.add("amll-fs-char-base");
                    baseChar.setAttribute("aria-hidden", "true");
                    activeChar.classList.add("amll-fs-char-active");
                    activeWordElement.insertBefore(charStack, activeChar);
                    charStack.appendChild(baseChar);
                    charStack.appendChild(activeChar);
                }

                const [baseCharElement, activeCharElement] = Array.from(charStack.children);
                if (!(baseCharElement instanceof HTMLElement) || !(activeCharElement instanceof HTMLElement)) {
                    continue;
                }

                baseCharElement.classList.add("amll-fs-char-base");
                baseCharElement.setAttribute("aria-hidden", "true");
                activeCharElement.classList.add("amll-fs-char-active");
                registerFullscreenPackedAnimationTarget(activeCharElement, charStack);
                charRecords.push({
                    stack: charStack,
                    base: baseCharElement,
                    active: activeCharElement,
                });
            }

            splitWord.__fsCharRecords = charRecords;
            return charRecords;
        };

        const formatMaskPx = (value) => {
            if (!Number.isFinite(value)) return "0";
            return `${Math.round(value * 1000) / 1000}`.replace(/\.0+$/, "").replace(/(\.\d*?)0+$/, "$1");
        };

        const shiftMaskPositionValue = (value, deltaX) => {
            if (typeof value !== "string" || value.trim().length === 0 || !Number.isFinite(deltaX)) {
                return value;
            }
            const match = value.match(/(-?\d+(?:\.\d+)?)px/);
            if (!match || typeof match.index !== "number") return value;
            const original = Number.parseFloat(match[1]);
            if (!Number.isFinite(original)) return value;
            const shifted = original - deltaX;
            return `${value.slice(0, match.index)}${formatMaskPx(shifted)}px${value.slice(match.index + match[0].length)}`;
        };

        const resolveAbsoluteMaskSize = (maskSize, referenceWidth) => {
            if (typeof maskSize !== "string" || maskSize.trim().length === 0) return maskSize;
            if (!Number.isFinite(referenceWidth) || referenceWidth <= 0) return maskSize;
            const parts = maskSize.trim().split(/\s+/);
            if (parts.length === 0) return maskSize;
            const percentMatch = parts[0].match(/^(-?\d+(?:\.\d+)?)%$/);
            if (!percentMatch) return maskSize;
            const absoluteWidth = referenceWidth * Number.parseFloat(percentMatch[1]) / 100;
            if (!Number.isFinite(absoluteWidth)) return maskSize;
            return `${formatMaskPx(absoluteWidth)}px${parts.length > 1 ? ` ${parts.slice(1).join(" ")}` : ""}`;
        };

            if (!(targetElement instanceof Element) || typeof targetElement.animate !== "function") return null;

            if (
                !sourceEffect
                || typeof sourceEffect.getKeyframes !== "function"
                || typeof sourceEffect.getTiming !== "function"
            ) {
                return null;
            }
            const sourceKeyframes = sourceEffect.getKeyframes();
            if (!Array.isArray(sourceKeyframes) || sourceKeyframes.length === 0) return null;
            const shiftedKeyframes = sourceKeyframes.map((keyframe) => {
                const next = { ...keyframe };
                if (typeof next.maskPosition === "string") {

                }
                if (typeof next.webkitMaskPosition === "string") {

                    animation.play();
                } else if (sourceAnimation.playState === "finished") {

                } else if (sourceAnimation.playState === "idle") {

                }

        const installFullscreenEmphasizedMaskAnimations = (splitWord) => {

            if (!(activeWordElement instanceof HTMLElement) || charRecords.length === 0) return;

            const rootWidth = Math.max(
                1,
                activeWordElement.clientWidth,
                rootRect.width,
                Number.isFinite(splitWord?.width) ? splitWord.width : 0

                activeWordElement.style.maskSize,
                rootWidth

                activeWordElement.style.webkitMaskSize,
                rootWidth

                if (activeWordElement.style.webkitMaskImage) {
                    activeChar.style.webkitMaskImage = activeWordElement.style.webkitMaskImage;
                }
                if (activeWordElement.style.maskRepeat) {
                    activeChar.style.maskRepeat = activeWordElement.style.maskRepeat;
                }
                if (activeWordElement.style.webkitMaskRepeat) {
                    activeChar.style.webkitMaskRepeat = activeWordElement.style.webkitMaskRepeat;
                }
                if (activeWordElement.style.maskOrigin) {
                    activeChar.style.maskOrigin = activeWordElement.style.maskOrigin;
                }
                if (activeWordElement.style.webkitMaskOrigin) {

                }

                const deltaX = activeRect.left - rootRect.left;

                    if (clone instanceof Animation) {

            activeWordElement.style.webkitMaskImage = "none";
            activeWordElement.style.maskPosition = "0 0";
            activeWordElement.style.webkitMaskPosition = "0 0";

            activeWordElement.style.webkitMaskSize = "auto";

            const lineStart = Number.isFinite(line?.startTime) ? line.startTime : 0;
            const wordStart = Number.isFinite(splitWord?.startTime) ? splitWord.startTime : lineStart;
            const wordEndRaw = Number.isFinite(splitWord?.endTime) ? splitWord.endTime : (wordStart + 1);

        const parseTTMLTimeToMs = (value) => {
            if (typeof value !== "string" || value.length === 0) return null;
            if (value.endsWith("ms")) {

                return Number.isFinite(n) ? Math.round(n) : null;
            }
            if (value.endsWith("s")) {
                const n = Number.parseFloat(value.slice(0, -1));
                return Number.isFinite(n) ? Math.round(n * 1000) : null;
            }
            const parts = value.split(":");
            if (parts.length === 2 || parts.length === 3) {
                const nums = parts.map((part) => Number.parseFloat(part));
                if (nums.some((n) => !Number.isFinite(n))) return null;
                if (parts.length === 2) {
                    return Math.round((nums[0] * 60 + nums[1]) * 1000);
                }
                return Math.round((nums[0] * 3600 + nums[1] * 60 + nums[2]) * 1000);

            return Number.isFinite(raw) ? Math.round(raw * 1000) : null;
        };

                    .filter((child) => child.localName === "span")
                    .map((child) => ({
                        startTime: parseTTMLTimeToMs(child.getAttribute("begin")),
                        endTime: parseTTMLTimeToMs(child.getAttribute("end")),
                        text: (child.textContent || "").trim(),
                    }));
                return {
                    startTime: parseTTMLTimeToMs(node.getAttribute("begin")),
                    endTime: parseTTMLTimeToMs(node.getAttribute("end")),
                    words,

        const assertXBgTiming = (ttml, parsedLines) => {

            const parsed = (Array.isArray(parsedLines) ? parsedLines : [])
                .filter((line) => line?.isBG)
                .map((line) => ({
                    startTime: Number.isFinite(line.startTime) ? line.startTime : null,
                    endTime: Number.isFinite(line.endTime) ? line.endTime : null,
                    words: Array.isArray(line.words)
                        ? line.words.map((word) => ({
                            startTime: Number.isFinite(word.startTime) ? word.startTime : null,
                            endTime: Number.isFinite(word.endTime) ? word.endTime : null,
                            text: (word.word || "").trim(),

                        : [],
                }));

            console.log(
                `[LyricsRenderer][x-bg][assert] source=${source.length}, parsed=${parsed.length}`
            );
            if (source.length !== parsed.length) {
                console.error("[LyricsRenderer][x-bg][assert] line count mismatch");
            }

            const n = Math.min(source.length, parsed.length);
            for (let i = 0; i < n; i++) {
                const src = source[i];
                const expected = {
                    startTime: Number.isFinite(src.startTime) ? Math.max(0, src.startTime + timeOffsetMs) : null,
                    endTime: Number.isFinite(src.endTime) ? Math.max(0, src.endTime + timeOffsetMs) : null,
                    words: src.words.map((word) => ({

                            ? Math.max(0, word.startTime + timeOffsetMs)
                            : null,

                            ? Math.max(0, word.endTime + timeOffsetMs)
                            : null,
                        text: word.text,

                const got = parsed[i];
                const startOk = expected.startTime === got.startTime;
                const endOk = expected.endTime === got.endTime;
                const wordCountOk = expected.words.length === got.words.length;
                const firstWordStartOk =
                    expected.words.length === 0
                    || got.words.length === 0
                    || expected.words[0].startTime === got.words[0].startTime;
                const lastWordEndOk =
                    expected.words.length === 0
                    || got.words.length === 0
                    || expected.words[expected.words.length - 1].endTime === got.words[got.words.length - 1].endTime;
                const ok = startOk && endOk && wordCountOk && firstWordStartOk && lastWordEndOk;

        const captureTimingSnapshot = (lines) => {

                if (Number.isFinite(snap.startTime)) line.startTime = snap.startTime;
                if (Number.isFinite(snap.endTime)) line.endTime = snap.endTime;
                if (!Array.isArray(line.words) || !Array.isArray(snap.words)) return;
                const wordCount = Math.min(line.words.length, snap.words.length);
                for (let wi = 0; wi < wordCount; wi++) {

                    .filter(Boolean)

        };

	        let lastKnownTimeMs = 0;

	        // Main-line indexes that were force-hidden by runtime logic.

	        let forcedExitedMainLines = new Set();

            if (!Array.isArray(lyricPlayer.processedLines)) return -1;

        };
	        const isMainLineStillVisible = (index) => {

	            }
	            const mainObj = lyricPlayer.currentLyricLineObjects?.[index];
	            return mainObj?.isEnabled === true;
	        };
        const enforceBGTimingWindows = (timeMs, force = false) => {

            const nextActive = new Set();
            let layoutChanged = false;
            const isPlaying = typeof lyricPlayer.getIsPlaying === "function"

                if (!Number.isInteger(idx) || idx < 0) return;

            for (const idx of (lyricPlayer.hotLines ?? [])) {

                    if (bgIdx !== -1) addIndex(bgIdx);
                }
            }
            for (const idx of (lyricPlayer.bufferedLines ?? [])) addIndex(idx);

            for (const idx of candidateIndexes) {

                const line = lineObj?.getLine?.() ?? lineObj?.lyricLine;
                if (!line?.isBG) continue;

                const pairedMainIndex = getPairedMainLineIndex(idx);
                const mainStillVisible =
                    isMainLineStillVisible(pairedMainIndex)
                    || nearSwitchRetreatMeta.has(pairedMainIndex);
                const inOwnTimeWindow =
                    Number.isFinite(line.startTime)
                    && Number.isFinite(line.endTime)
                    && timeMs >= line.startTime
                    && timeMs < line.endTime;
                const started = Number.isFinite(line.startTime) && timeMs >= line.startTime;
                const mainForcedExit = forcedExitedMainLines.has(pairedMainIndex);
                const shouldBeActive = !mainForcedExit && (inOwnTimeWindow || (started && mainStillVisible));
                const wasActive = bgActiveIndexes.has(idx);
                const isEnabled = lineObj?.isEnabled === true;

                    nextActive.add(idx);
                    if (!lyricPlayer.hotLines?.has(idx)) {
                        lyricPlayer.hotLines?.add(idx);
                        layoutChanged = true;
                    }
                    if (!lyricPlayer.bufferedLines?.has(idx)) {
                        lyricPlayer.bufferedLines?.add(idx);
                        layoutChanged = true;
                    }
                    if (!isEnabled && typeof lineObj?.enable === "function") {

	            }
	            return -1;
	        };
        const originalSetCurrentTime = (ms, force = false) => {

	        lyricPlayer.setCurrentTime = originalSetCurrentTime;
	        let leadInMs = 300;
	        let generalLeadInMs = 0;
	        let nearSwitchGapMs = 70;
	        let nearSwitchWordLeadInRatio = 0.6;
	        let interludeDotsOffsetX = 0;
	        let timeOffsetMs = 0;

        let lastTime = performance.now();
        function animate(time) {
            const delta = time - lastTime;
            lastTime = time;
            if (externalIsPlaying) {
                const predictedTimeMs = Math.max(
                    0,
                    Math.floor(externalTimeMs + (time - externalTimeAnchorPerfMs))
                );
                // Keep AMLL progression smooth in JS without requiring high-frequency Swift updates.
                if (Math.abs(predictedTimeMs - lastKnownTimeMs) >= 1) {
                    originalSetCurrentTime(predictedTimeMs, false);
                }
            }
            lyricPlayer.update(delta);
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);

        // Notify bridge that renderer is ready (after LyricsRenderer defined)
        if (window.AMLL && typeof window.AMLL._onRendererReady === "function") {
            window.AMLL._onRendererReady();
        } else {
            console.warn("[LyricsRenderer] AMLL bridge not ready");
        }

    </script>
</body>
