<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>PV Lyrics Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        
        #pv-container { width: 100%; height: 100%; }
        
        .panels-wrapper { display: none !important; }
        .mobile-toggle { display: none !important; }
        
        #overlay-ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 100;
        }
        
        #template-name {
            position: absolute;
            top: 16px;
            left: 16px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            pointer-events: auto;
        }
        
        #status {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 6px;
            color: rgba(255,255,255,0.8);
            font-size: 13px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        
        #control-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            pointer-events: auto;
        }
        
        .btn-row { display: flex; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
        
        .btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .btn:hover { background: rgba(255,255,255,0.2); }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; }
        .btn-accent { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); border: none; }
        
        #lrc-input-wrapper { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 200px; }
        #lrc-input-wrapper label { font-size: 11px; color: rgba(255,255,255,0.5); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        
        #lrc-input {
            width: 100%;
            height: 50px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: #fff;
            padding: 8px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 11px;
            resize: none;
            outline: none;
        }
        #lrc-input:focus { border-color: rgba(100, 120, 255, 0.5); }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="pv-container"></div>
    
    <div id="overlay-ui">
        <div id="template-name">Loading...</div>
        <div id="status">-</div>
        
        <div id="control-bar">
            <div class="btn-row">
                <button class="btn btn-primary" id="btn-template">Random Template</button>
                <button class="btn btn-accent" id="btn-fx">Random FX</button>
                <button class="btn" id="btn-auto">Auto: ON</button>
                <button class="btn" id="btn-speed">Speed 1x</button>
                <button class="btn" id="btn-apply" style="background:#2a6;">Apply Lyrics</button>
            </div>
            <div id="lrc-input-wrapper">
                <label>LRC Lyrics</label>
                <textarea id="lrc-input" placeholder="Paste LRC lyrics here..."></textarea>
            </div>
        </div>
    </div>

    <script type="module" crossorigin src="./assets/index-B1h101_-.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BjnNwW8h.css">
    
    <script>
    (function() {
        var TEMPLATE_NAMES = [
            'Blue Impact', 'Slash', 'Blue Structure', 'Cyber Ruins', 'Geometric',
            'Matrix Rain', 'Night City HUD', 'Emotion Cinema', 'Hysteric Night', 'Spider Web',
            'Staggered Text', 'Calm Villain', 'Girly Clouds', 'Sweet Pink', 'Fly Me to the Moon', 'Kawaii Pixel'
        ];
        
        var currentTemplate = 0;
        var autoSwitch = true;
        var autoTimer = null;
        var speedIdx = 1;
        var speeds = [0.5, 1, 2, 3];
        
        var sampleLRC = '[ti:Fireworks]\n[ar:Nanxi Kenen]\n[00:00.00]Fireworks - Nanxi Kenen\n[00:04.00]This is not what you imagined, right\n[00:08.00]Although I was prepared, I still cried\n[00:12.00]This is not what I wanted, saying it does not matter\n[00:16.00]Just to make myself feel a bit better\n[00:22.00]Brilliant fireworks will eventually fall\n[00:26.00]Innocence and kindness will eventually grow up\n[00:30.00]To become a beam of light, you must bloom with intense heat\n[00:34.00]Even if the road is long, even if you suffer more injuries\n[00:38.00]Even if there are obstacles ahead, you must illuminate\n[00:44.00]Brilliant fireworks will eventually forget\n[00:48.00]Strong alone, covering the scars\n[00:52.00]Your steps are full of hope and strength\n[00:56.00]Even if the night is long, it will sprout with dreams\n[01:00.00]Believe in your direction and you will arrive\n[01:06.00]We were all lost people\n[01:10.00]Pursuing the happiness we wanted\n[01:14.00]But in the end we became confused people\n[01:18.00]Forgetting the process\n[01:22.00]Brilliant fireworks will eventually fall\n[01:26.00]Innocence and kindness will eventually grow up';
        
        document.getElementById('lrc-input').value = sampleLRC;
        
        function waitForEngine(callback) {
            if (window.PVApi && window.PVApi._ready) {
                callback();
            } else {
                setTimeout(function() { waitForEngine(callback); }, 100);
            }
        }
        
        function applyLRCFromTextarea() {
            var text = document.getElementById('lrc-input').value.trim();
            if (!text) { console.log('[PV Demo] No text input'); return; }
            
            var hasTimestamps = /\[\d{1,2}:\d{2}/.test(text);
            console.log('[PV Demo] Checking LRC - hasTimestamps:', hasTimestamps, 'PVParseLrc:', !!window.PVParseLrc, 'PVEngine:', !!window.PVEngine);
            
            if (hasTimestamps && window.PVParseLrc) {
                var parsed = window.PVParseLrc(text);
                console.log('[PV Demo] Parsed LRC:', parsed.length, 'lines', parsed.slice(0,3));
                if (parsed.length > 0 && window.PVEngine) {
                    window.PVEngine.setLyricTimeline(parsed);
                    console.log('[PV Demo] Applied LRC to engine. Debug:', window.PVApi?.debug());
                    return;
                }
            }
            
            console.log('[PV Demo] Falling back to setText');
            if (window.PVApi) {
                window.PVApi.setText(text.replace(/\r?\n/g, '/'));
            }
        }
        
        function randomTemplate() {
            if (!window.PVApi) return;
            currentTemplate = window.PVApi.randomTemplate();
            document.getElementById('template-name').textContent = TEMPLATE_NAMES[currentTemplate] || 'Template ' + currentTemplate;
        }
        
        function randomFX() {
            if (window.PVApi) window.PVApi.randomizePostFX();
        }
        
        function toggleAuto() {
            autoSwitch = !autoSwitch;
            document.getElementById('btn-auto').textContent = autoSwitch ? 'Auto: ON' : 'Auto: OFF';
            autoSwitch ? startAuto() : stopAuto();
        }
        
        function startAuto() {
            stopAuto();
            autoTimer = setInterval(function() {
                randomTemplate();
                randomFX();
            }, 12000 + Math.random() * 18000);
        }
        
        function stopAuto() {
            if (autoTimer) clearInterval(autoTimer);
            autoTimer = null;
        }
        
        function cycleSpeed() {
            speedIdx = (speedIdx + 1) % speeds.length;
            if (window.PVApi) window.PVApi.setSpeed(speeds[speedIdx]);
            document.getElementById('btn-speed').textContent = 'Speed ' + speeds[speedIdx] + 'x';
        }
        
        function updateStatus() {
            if (!window.PVEngine) return;
            var t = window.PVEngine.playbackTime;
            var d = window.PVEngine.timelineDuration;
            var hasLyrics = window.PVEngine.hasLyricTimeline;
            var lineCount = window.PVEngine.lyricLineCount || 0;
            
            var status = '';
            if (hasLyrics) {
                status = lineCount + ' lyrics | ';
            }
            status += fmt(t) + ' / ' + fmt(d);
            document.getElementById('status').textContent = status;
        }
        
        function fmt(s) {
            return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
        }
        
        function init() {
            console.log('[PV Demo] Waiting for engine...');
            
            waitForEngine(function() {
                console.log('[PV Demo] Engine ready!');
                
                document.getElementById('btn-template').onclick = randomTemplate;
                document.getElementById('btn-fx').onclick = randomFX;
                document.getElementById('btn-auto').onclick = toggleAuto;
                document.getElementById('btn-speed').onclick = cycleSpeed;
                document.getElementById('btn-apply').onclick = function() {
                    applyLRCFromTextarea();
                    var btn = this;
                    btn.textContent = 'Applied!';
                    btn.style.background = '#4a8';
                    setTimeout(function() {
                        btn.textContent = 'Apply Lyrics';
                        btn.style.background = '#2a6';
                    }, 1500);
                };
                
                randomTemplate();
                startAuto();
                setInterval(updateStatus, 200);
                
                setTimeout(applyLRCFromTextarea, 500);
            });
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            setTimeout(init, 100);
        }
    })();
    </script>
</body>
</html>
